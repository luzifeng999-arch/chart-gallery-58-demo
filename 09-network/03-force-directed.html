<!DOCTYPE html><html><head><meta charset="UTF-8"><title>力导向网络图</title><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><style>body{margin:0;background:#080C14}#c{width:100vw;height:100vh}</style></head><body><div id="c"></div><script>echarts.init(document.getElementById('c')).setOption({series:[{type:'graph',layout:'force',data:[{name:'Node1'},{name:'Node2'},{name:'Node3'}],links:[{source:'Node1',target:'Node2'},{source:'Node2',target:'Node3'}],label:{show:true,color:'#C8D4E8'}}]});
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
