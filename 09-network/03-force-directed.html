<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>力导向网络 Force Directed</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--split:#141E30;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--split:#EEF2F7;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);padding:4px 0;margin-bottom:4px;outline:none;transition:color .3s}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#chart{flex:1}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:background .3s,border-color .3s}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title);transition:color .3s}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px;transition:color .3s}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
.section-title{font-size:12px;color:var(--label);font-weight:600;margin:8px 0 6px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:4px 4px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none;transition:all .2s}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
.add-row{width:100%;margin-top:8px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.add-row:hover{border-color:var(--input-focus);color:var(--input-focus)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 4px}
.del-btn:hover{color:#FF6B6B}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false">社交网络力导向图</div>
  <div class="chart-subtitle">用户关系网络可视化 · 拖拽节点可重新布局</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>编辑节点和连接关系</p></div>
  <div class="editor-body">
    <div class="section-title">节点（分类0-4）</div>
    <table><thead><tr><th>名称</th><th>大小</th><th>类</th><th></th></tr></thead><tbody id="node-rows"></tbody></table>
    <button class="add-row" onclick="addNode()">＋ 添加节点</button>
    <div class="section-title" style="margin-top:14px">连接</div>
    <table><thead><tr><th>起点</th><th>终点</th><th></th></tr></thead><tbody id="edge-rows"></tbody></table>
    <button class="add-row" onclick="addEdge()">＋ 添加连接</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES = {
  dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF',colors:['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF'],lineColor:'#1A2236'},
  light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF',colors:['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1'],lineColor:'#C8D4E0'}
};
const DEFAULT_NODES = [
  {name:'Alice',size:40,cat:0},{name:'Bob',size:35,cat:0},{name:'Carol',size:30,cat:1},
  {name:'Dave',size:45,cat:1},{name:'Eve',size:25,cat:2},{name:'Frank',size:30,cat:2},
  {name:'Grace',size:35,cat:3},{name:'Hank',size:28,cat:0},{name:'Iris',size:32,cat:1}
];
const DEFAULT_EDGES = [
  {s:'Alice',t:'Bob'},{s:'Alice',t:'Carol'},{s:'Bob',t:'Dave'},{s:'Carol',t:'Eve'},
  {s:'Dave',t:'Frank'},{s:'Frank',t:'Grace'},{s:'Grace',t:'Alice'},{s:'Hank',t:'Bob'},
  {s:'Iris',t:'Carol'},{s:'Dave',t:'Grace'}
];
let NODES = JSON.parse(JSON.stringify(DEFAULT_NODES));
let EDGES = JSON.parse(JSON.stringify(DEFAULT_EDGES));
let mode = 'dark';
const chart = echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());

function buildOption(t) {
  return {
    backgroundColor:'transparent',
    tooltip:{trigger:'item',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor}},
    series:[{
      type:'graph',layout:'force',
      data:NODES.map(n=>({name:n.name,symbolSize:n.size,category:n.cat,itemStyle:{color:t.colors[n.cat%t.colors.length]},label:{show:true,color:t.textColor,fontSize:11}})),
      edges:EDGES.map(e=>({source:e.s,target:e.t,lineStyle:{color:t.lineColor,width:1.5,opacity:0.8}})),
      force:{repulsion:300,gravity:0.1,edgeLength:[50,150]},
      draggable:true,
      label:{show:true},
      lineStyle:{curveness:0.1}
    }]
  };
}

function renderTable(){
  const t=THEMES[mode];
  document.getElementById('node-rows').innerHTML=NODES.map((d,i)=>`<tr>
    <td><input value="${d.name}" oninput="NODES[${i}].name=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input type="number" value="${d.size}" oninput="NODES[${i}].size=+this.value" style="width:44px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input type="number" min="0" max="4" value="${d.cat}" oninput="NODES[${i}].cat=+this.value" style="width:36px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><button class="del-btn" onclick="removeNode(${i})">×</button></td>
  </tr>`).join('');
  document.getElementById('edge-rows').innerHTML=EDGES.map((d,i)=>`<tr>
    <td><input value="${d.s}" oninput="EDGES[${i}].s=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input value="${d.t}" oninput="EDGES[${i}].t=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><button class="del-btn" onclick="removeEdge(${i})">×</button></td>
  </tr>`).join('');
}
function removeNode(i){NODES.splice(i,1);renderTable();}
function addNode(){NODES.push({name:'新节点',size:25,cat:0});renderTable();}
function removeEdge(i){EDGES.splice(i,1);renderTable();}
function addEdge(){EDGES.push({s:'A',t:'B'});renderTable();}
function applyData(){chart.setOption(buildOption(THEMES[mode]),true);showToast('✓ 已更新');}
function resetData(){NODES=JSON.parse(JSON.stringify(DEFAULT_NODES));EDGES=JSON.parse(JSON.stringify(DEFAULT_EDGES));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=THEMES[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');if(btn){btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;}renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);const btn=document.getElementById('theme-btn');if(btn)btn.textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
window.addEventListener('message',function(e){if(e.data&&e.data.type==='setTheme'){mode=e.data.theme;applyTheme(mode);var btn=document.getElementById('theme-btn');if(btn)btn.style.display='none';}});
renderTable();chart.setOption(buildOption(THEMES[mode]));
</script>
</body>
</html>
