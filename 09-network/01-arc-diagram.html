<!DOCTYPE html><html><head><meta charset="UTF-8"><title>弧图</title><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><style>body{margin:0;background:#080C14}#c{width:100vw;height:100vh}</style></head><body><div id="c"></div><script>echarts.init(document.getElementById('c')).setOption({series:[{type:'graph',layout:'none',data:[{name:'A',x:50,y:200},{name:'B',x:150,y:200},{name:'C',x:250,y:200}],links:[{source:'A',target:'B'},{source:'B',target:'C'}],lineStyle:{curveness:0.3,color:'#4D9EFF'}}]});
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
