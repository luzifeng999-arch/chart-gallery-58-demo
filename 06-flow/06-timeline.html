<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>时间轴 Timeline</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0;overflow:auto}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#timeline-wrap{flex:1;overflow:auto;padding:20px 0}.timeline{position:relative;padding-left:60px}.timeline-line{position:absolute;left:28px;top:0;bottom:0;width:2px;background:var(--border)}.event{position:relative;margin-bottom:40px}.event-dot{position:absolute;left:-32px;top:6px;width:12px;height:12px;border-radius:50%;border:2px solid;background:var(--bg)}.event-date{font-size:11px;color:var(--label);font-weight:600;margin-bottom:4px}.event-title{font-size:14px;font-weight:600;color:var(--title);margin-bottom:6px}.event-desc{font-size:12px;color:var(--text);line-height:1.6}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:16px;font-size:12px;color:var(--label);line-height:1.8}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">OpenAI 发展历程时间轴</div>
  <div class="chart-subtitle">2015-2024 重要里程碑事件 · 适合叙事型信息展示</div>
  <div id="timeline-wrap"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>图表说明</h3><p>Timeline 时间轴</p></div>
  <div class="editor-body">
    时间轴（Timeline）用于叙事型事件展示：<br><br>
    • 时间线贯穿全图<br>
    • 圆点标记事件节点<br>
    • 颜色区分事件类型/重要度<br>
    • 垂直排布，从上至下=时间推进<br><br>
    <b>适用场景：</b><br>
    · 公司发展历程<br>
    · 产品迭代路线图<br>
    · 历史事件梳理<br>
    · 项目进度展示<br><br>
    使用纯CSS+HTML实现，无需图表库。
  </div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="render()">↺ 刷新</button><button class="btn btn-apply" onclick="toggleTheme()">🌓 切换</button></div>
</div>
<script>
const T={dark:{bg:'#080C14',panel:'#0E1420',border:'#1A2236',text:'#C8D4E8',label:'#5A6A84',title:'#F0F4FF',colors:['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF'],btnSec:'#1A2236'},light:{bg:'#F5F7FA',panel:'#FFFFFF',border:'#E1E8F0',text:'#2D3A4A',label:'#8A9BB0',title:'#0D1525',colors:['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1'],btnSec:'#F0F4FA'}};
let mode='dark';
const EVENTS=[{date:'2015.12',title:'OpenAI 成立',desc:'Elon Musk、Sam Altman等人联合创立，承诺10亿美元投资',type:0},{date:'2018.06',title:'GPT-1 发布',desc:'首个生成式预训练Transformer模型，参数量1.17亿',type:1},{date:'2019.02',title:'GPT-2 发布',desc:'参数量升至15亿，展现惊人文本生成能力',type:1},{date:'2019.07',title:'微软投资10亿美元',desc:'战略合作，Azure成为独家云服务商',type:2},{date:'2020.06',title:'GPT-3 发布',desc:'1750亿参数，引发AI革命浪潮',type:1},{date:'2022.11',title:'ChatGPT 公开发布',desc:'5天破百万用户，2个月破1亿，现象级产品',type:3},{date:'2023.03',title:'GPT-4 发布',desc:'多模态能力，性能大幅提升',type:1},{date:'2023.11',title:'Sam Altman 被罢免又复职',desc:'董事会风波，700员工联名威胁辞职',type:4},{date:'2024.05',title:'GPT-4o 发布',desc:'实时语音视觉多模态交互，免费开放',type:1}];
function render(){
  const t=T[mode];const wrap=document.getElementById('timeline-wrap');
  wrap.innerHTML=`<div class="timeline"><div class="timeline-line"></div>${EVENTS.map((e,i)=>`<div class="event"><div class="event-dot" style="border-color:${t.colors[e.type]};box-shadow:0 0 8px ${t.colors[e.type]}66"></div><div class="event-date">${e.date}</div><div class="event-title">${e.title}</div><div class="event-desc">${e.desc}</div></div>`).join('')}</div>`;
  document.documentElement.style.setProperty('--bg',t.bg);document.documentElement.style.setProperty('--panel-bg',t.panel);document.documentElement.style.setProperty('--border',t.border);document.documentElement.style.setProperty('--title',t.title);document.documentElement.style.setProperty('--text',t.text);document.documentElement.style.setProperty('--label',t.label);
}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panel;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.text;btn.style.borderColor=t.border;document.documentElement.style.setProperty('--btn-sec',t.btnSec);render();}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
applyTheme('dark');
</script></body></html>
