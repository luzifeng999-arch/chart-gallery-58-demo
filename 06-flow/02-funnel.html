<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>漏斗图 Funnel Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:12px 16px}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}table{width:100%;border-collapse:collapse;font-size:13px}th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}td{padding:5px 4px}td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none}td input:focus{border-color:var(--input-focus)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}.add-row{width:100%;margin-top:10px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 4px}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">电商用户转化漏斗</div>
  <div class="chart-subtitle">各层转化率标注 · 核心洞察：加购→下单环节流失最大(43%)，需重点优化</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>漏斗各阶段数据</p></div>
  <div class="editor-body"><table><thead><tr><th>阶段</th><th>人数</th><th></th></tr></thead><tbody id="data-rows"></tbody></table><button class="add-row" onclick="addRow()">＋ 添加阶段</button></div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',s:['#4D9EFF','#30D986','#FFB340','#9B7FFF','#FF8C42'],btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',s:['#2B7FFF','#00B96B','#FA8C16','#722ED1','#F97316'],btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
const DF={items:[{name:'浏览商品',value:100000},{name:'加入购物车',value:38000},{name:'发起结算',value:21000},{name:'提交订单',value:12000},{name:'支付成功',value:9800}]};
let D=JSON.parse(JSON.stringify(DF)),mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildOption(t){
  const top=D.items[0]?.value||1;
  const lossStages=D.items.map((d,i)=>{
    if(i===0)return{name:d.name,lossRate:0};
    const prev=D.items[i-1].value;
    const lossRate=((prev-d.value)/prev*100);
    return{name:d.name,lossRate};
  }).sort((a,b)=>b.lossRate-a.lossRate);
  const worstStage=lossStages[0];
  
  return{backgroundColor:'transparent',tooltip:{trigger:'item',formatter:p=>{const i=p.dataIndex;const prev=i>0?D.items[i-1].value:p.value;const cvr=(p.value/prev*100).toFixed(1);const lossRate=((prev-p.value)/prev*100).toFixed(1);return `<b>${p.name}</b><br/>人数：<b>${p.value.toLocaleString()}</b><br/>转化率：<b style="color:${cvr<50?'#FF6B6B':'#30D986'}">${cvr}%</b><br/>流失率：<b style="color:#FF6B6B">${lossRate}%</b><br/>占首层：<b>${(p.value/top*100).toFixed(1)}%</b>`;},backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor}},series:[{type:'funnel',left:'15%',width:'70%',top:30,bottom:30,sort:'descending',gap:4,data:D.items.map((d,i)=>{const prev=i>0?D.items[i-1].value:d.value;const cvr=d.value/prev;const isWorst=d.name===worstStage.name&&i>0;return{name:d.name,value:d.value,itemStyle:{color:isWorst?t.s[3]:t.s[i%5],shadowBlur:isWorst?16:8,shadowColor:isWorst?(t.s[3]+'66'):(t.s[i%5]+'44')}}}),label:{show:true,position:'inside',color:'#fff',fontSize:11,fontWeight:600,formatter:p=>{const i=p.dataIndex;const prev=i>0?D.items[i-1].value:p.value;const cvr=(p.value/prev*100).toFixed(0);const lossRate=((prev-p.value)/prev*100).toFixed(0);const isWorst=p.name===worstStage.name&&i>0;return isWorst?`${p.name}\n${p.value.toLocaleString()}人\n⚠️ 流失${lossRate}%`:`${p.name}\n${p.value.toLocaleString()}人\n↓转化${cvr}%`;}},labelLine:{show:false},emphasis:{label:{show:true,fontSize:12}}}]};}
function renderTable(){const t=T[mode];document.getElementById('data-rows').innerHTML=D.items.map((d,i)=>`<tr><td><input value="${d.name}" oninput="D.items[${i}].name=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><input type="number" value="${d.value}" oninput="D.items[${i}].value=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><button class="del-btn" onclick="removeRow(${i})">×</button></td></tr>`).join('');}
function addRow(){D.items.push({name:'新阶段',value:Math.floor(D.items[D.items.length-1]?.value*0.6||1000)});renderTable();}
function removeRow(i){D.items.splice(i,1);renderTable();applyData();}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){D=JSON.parse(JSON.stringify(DF));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
renderTable();applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
