<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>桑基图 Sankey Diagram</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:16px;font-size:12px;color:var(--label);line-height:1.8}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">用户流量来源 → 页面 → 转化行为（桑基图）</div>
  <div class="chart-subtitle">流宽=流量大小 · 颜色继承来源节点 · 核心洞察：搜索流量转化率最高</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>图表说明</h3><p>Sankey Diagram</p></div>
  <div class="editor-body">
    桑基图展示多节点间的流量流动：<br><br>
    • 节点宽度=流经该节点的总量<br>
    • 连接带宽=两节点间流量<br>
    • 颜色继承来源节点色<br><br>
    <b>最佳实践：</b><br>
    lineStyle.color 设为 'source' 让颜色跟随来源节点，视觉更清晰。<br><br>
    <b>适用场景：</b><br>
    · 用户转化路径分析<br>
    · 能源流向图<br>
    · 预算分配流向<br>
    · 供应链流转
  </div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',s:['#4D9EFF','#30D986','#FFB340','#9B7FFF','#FF8C42','#00D4D4','#FF6B6B','#7EF5A0'],btnSec:'#1A2236'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',s:['#2B7FFF','#00B96B','#FA8C16','#722ED1','#F97316','#0891B2','#F5222D','#16A34A'],btnSec:'#F0F4FA'}};
let mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildOption(t){
  const links=[{source:'搜索引擎',target:'搜索结果',value:800},{source:'搜索引擎',target:'商品页',value:400},{source:'社交媒体',target:'首页',value:600},{source:'社交媒体',target:'商品页',value:300},{source:'直接访问',target:'首页',value:500},{source:'推荐链接',target:'商品页',value:350},{source:'首页',target:'商品页',value:850},{source:'首页',target:'流失',value:250},{source:'搜索结果',target:'商品页',value:600},{source:'搜索结果',target:'流失',value:200},{source:'商品页',target:'加入购物车',value:820},{source:'商品页',target:'流失',value:780},{source:'加入购物车',target:'完成购买',value:580},{source:'加入购物车',target:'流失',value:240}];
  const totalLoss=links.filter(l=>l.target==='流失').reduce((s,l)=>s+l.value,0);
  const maxSuccessPath=580;
  
  return{backgroundColor:'transparent',tooltip:{trigger:'item',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:params=>{if(params.dataType==='edge'){const lossRate=params.data.target==='流失'?((params.data.value/params.data.sourceValue)*100).toFixed(1)+'%':'';return `${params.data.source} → ${params.data.target}<br/>流量：<b>${params.data.value}</b>${lossRate?`<br/><span style="color:#FF6B6B">流失率：${lossRate}</span>`:''}`;}return params.name+`<br/>总流量：${params.value}`;}},series:[{type:'sankey',layout:'none',emphasis:{focus:'adjacency'},data:[{name:'搜索引擎'},{name:'社交媒体'},{name:'直接访问'},{name:'推荐链接'},{name:'首页'},{name:'商品页'},{name:'搜索结果'},{name:'加入购物车'},{name:'完成购买',itemStyle:{color:t.s[1],shadowBlur:12,shadowColor:t.s[1]+'88'}},{name:'流失',itemStyle:{color:t.s[6]+'66',opacity:0.4}}],links:links.map(l=>({...l,lineStyle:{color:'source',opacity:l.target==='流失'?0.2:l.source==='加入购物车'&&l.target==='完成购买'?0.8:0.5,shadowBlur:l.source==='加入购物车'&&l.target==='完成购买'?10:0,shadowColor:l.source==='加入购物车'&&l.target==='完成购买'?(t.s[1]+'66'):'transparent'}})),nodeWidth:20,nodeGap:12,label:{color:t.textColor,fontSize:12,formatter:p=>p.name==='流失'?`⚠️ ${p.name}\n(${totalLoss})`:p.name==='完成购买'?`✓ ${p.name}\n(${maxSuccessPath})`:p.name},itemStyle:{borderColor:t.bg},lineStyle:{curveness:0.5}}]};}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){chart.setOption(buildOption(T[mode]),true);showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
