<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>蜡烛图 Candlestick</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:12px 16px}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}.info-text{font-size:12px;color:var(--label);line-height:1.8;padding:8px 0}.info-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px 4px 2px 0}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">BTC/USDT 日K线（蜡烛图）</div>
  <div class="chart-subtitle">OHLC：开盘/最高/最低/收盘 · 绿涨红跌 · 含成交量副图</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>图表说明</h3><p>K线图结构</p></div>
  <div class="editor-body">
    <div class="info-text">
      每根蜡烛表示一个时间周期的价格变动：<br><br>
      <span class="info-badge" style="background:#30D98633;color:#30D986">绿色实体</span> 收盘 &gt; 开盘（上涨）<br>
      <span class="info-badge" style="background:#FF6B6B33;color:#FF6B6B">红色实体</span> 收盘 &lt; 开盘（下跌）<br><br>
      <b>上影线</b>：最高价与实体上沿距离<br>
      <b>下影线</b>：最低价与实体下沿距离<br><br>
      下方副图为对应成交量柱状图，颜色与K线对应。
    </div>
  </div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',up:'#30D986',down:'#FF6B6B',btnSec:'#1A2236'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',up:'#00B96B',down:'#F5222D',btnSec:'#F0F4FA'}};
const dates=['3/1','3/2','3/3','3/4','3/5','3/6','3/7','3/8','3/9','3/10','3/11','3/12','3/13','3/14','3/15'];
// [open, close, low, high]
const DF_OHLC=[[62100,63500,61800,64200],[63500,62800,62400,63900],[62800,64900,62600,65300],[64900,64200,63800,65100],[64200,65800,64000,66200],[65800,65100,64700,66000],[65100,66800,65000,67200],[66800,65600,65200,67000],[65600,67200,65400,67800],[67200,68500,67000,69000],[68500,67800,67200,68900],[67800,69200,67600,69600],[69200,70500,69000,71000],[70500,70100,69800,71200],[70100,71800,69900,72000]];
const DF_VOL=[4200,3800,5100,4600,5800,4300,6200,5500,5900,7100,5300,6800,7500,6100,8200];
let mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildOption(t){return{backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'cross'},backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor,fontSize:12}},grid:[{left:70,right:20,top:20,bottom:'35%'},{left:70,right:20,top:'68%',bottom:40}],xAxis:[{type:'category',data:dates,gridIndex:0,axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{show:false},axisTick:{show:false}},{type:'category',data:dates,gridIndex:1,axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor,fontSize:11},axisTick:{show:false}}],yAxis:[{gridIndex:0,axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor}},{gridIndex:1,axisLine:{show:false},axisTick:{show:false},splitLine:{show:false},axisLabel:{color:t.labelColor,formatter:v=>(v/1000).toFixed(0)+'k'}}],series:[{type:'candlestick',xAxisIndex:0,yAxisIndex:0,data:DF_OHLC,itemStyle:{color:t.up,color0:t.down,borderColor:t.up,borderColor0:t.down}},{type:'bar',xAxisIndex:1,yAxisIndex:1,data:DF_VOL,itemStyle:{color:p=>DF_OHLC[p.dataIndex][1]>=DF_OHLC[p.dataIndex][0]?t.up+'99':t.down+'99',borderRadius:[2,2,0,0]}}]};}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){chart.setOption(buildOption(T[mode]),true);showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
