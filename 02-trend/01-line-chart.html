<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>折线图 Line Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:12px 16px}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}table{width:100%;border-collapse:collapse;font-size:13px}th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}td{padding:5px 4px}td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none}td input:focus{border-color:var(--input-focus)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}.add-row{width:100%;margin-top:10px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 4px}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">月活跃用户趋势 · 同比增长追踪</div>
  <div class="chart-subtitle">2024年 vs 2023年 · 单位：万人 · 核心洞察：8月达峰 640万，YoY+97% · 目标区间高亮</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>修改后点击应用</p></div>
  <div class="editor-body"><table><thead><tr><th>月份</th><th>用户(万)</th><th></th></tr></thead><tbody id="data-rows"></tbody></table><button class="add-row" onclick="addRow()">＋ 添加行</button></div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',s:['#4D9EFF','#30D986','#FFB340','#FF6B6B'],btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',s:['#2B7FFF','#00B96B','#FA8C16','#F5222D'],btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
const DF={labels:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],values:[320,280,350,410,460,520,580,640,560,490,440,380],prevValues:[162,145,180,208,235,268,300,325,285,250,225,194],target:550};
let D=JSON.parse(JSON.stringify(DF)),mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildOption(t){const maxV=Math.max(...D.values),maxI=D.values.indexOf(maxV);const prevVals=D.prevValues||D.values.map(v=>Math.round(v*0.51));const target=D.target||Math.round(maxV*0.86);const yoyMax=((D.values[maxI]-prevVals[maxI])/prevVals[maxI]*100).toFixed(0);return{backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:params=>{const cur=params.find(p=>p.seriesName==='本年');const prev=params.find(p=>p.seriesName==='去年');if(!cur)return '';const yoy=prev?(((cur.value-prev.value)/prev.value)*100).toFixed(1):'';return `${cur.axisValue}<br/>本年：<b>${cur.value}万人</b>${yoy?`<br/>YoY：<b style="color:${+yoy>=0?t.s[0]:t.s[3]}">${+yoy>=0?'+':''}${yoy}%</b>`:''}${prev?`<br/>去年：${prev.value}万人`:''}`;}},legend:{data:['本年','去年'],right:80,top:4,textStyle:{color:t.labelColor},itemWidth:16,itemHeight:3},grid:{left:60,right:20,top:36,bottom:40},xAxis:{type:'category',data:D.labels,axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor},axisTick:{show:false}},yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor,formatter:v=>v+'万'}},series:[{name:'本年',type:'line',data:D.values,smooth:true,lineStyle:{color:t.s[0],width:3,shadowBlur:8,shadowColor:t.s[0]+'55'},itemStyle:{color:t.s[0]},symbol:'circle',symbolSize:5,areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:t.s[0]+'77'},{offset:0.6,color:t.s[0]+'22'},{offset:1,color:t.s[0]+'00'}]}},markPoint:{data:[{coord:[D.labels[maxI],D.values[maxI]],name:'峰值'}],symbol:'roundRect',symbolSize:[72,30],symbolOffset:[0,-22],itemStyle:{color:t.s[2],shadowBlur:12,shadowColor:t.s[2]+'88'},label:{formatter:`↑ ${D.values[maxI]}万\nYoY+${yoyMax}%`,color:'#fff',fontSize:10,lineHeight:14}},markLine:{silent:true,data:[{yAxis:target,lineStyle:{color:t.s[1],width:2,type:'dashed'},label:{formatter:`目标 ${target}万`,color:t.s[1],position:'insideEndTop',fontSize:11}}],symbol:['none','none']}},{name:'去年',type:'line',data:prevVals,smooth:true,lineStyle:{color:t.labelColor,width:1.5,type:'dotted',opacity:.8},itemStyle:{color:t.labelColor},symbol:'none',areaStyle:{color:'transparent'}}]};}
function renderTable(){const t=T[mode];document.getElementById('data-rows').innerHTML=D.labels.map((l,i)=>`<tr><td><input value="${l}" oninput="D.labels[${i}]=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><input type="number" value="${D.values[i]}" oninput="D.values[${i}]=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><button class="del-btn" onclick="removeRow(${i})">×</button></td></tr>`).join('');}
function addRow(){D.labels.push('新月');D.values.push(300);renderTable();}
function removeRow(i){D.labels.splice(i,1);D.values.splice(i,1);renderTable();applyData();}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){D=JSON.parse(JSON.stringify(DF));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
renderTable();applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
