<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>甘特图 Gantt Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:12px 16px}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}table{width:100%;border-collapse:collapse;font-size:11px}th{color:var(--label);font-weight:500;padding:5px 3px;text-align:left;border-bottom:1px solid var(--border)}td{padding:4px 3px}td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:3px 4px;border-radius:4px;font-size:10px;outline:none}td input:focus{border-color:var(--input-focus)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">AI产品Q2版本迭代计划（甘特图）</div>
  <div class="chart-subtitle">项目时间进度与任务排期 · 颜色区分不同负责团队</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>开始周/结束周（1-12）</p></div>
  <div class="editor-body"><table><thead><tr><th>任务</th><th>开始</th><th>结束</th></tr></thead><tbody id="data-rows"></tbody></table></div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',s:['#4D9EFF','#30D986','#FFB340','#9B7FFF','#FF8C42','#00D4D4'],btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',s:['#2B7FFF','#00B96B','#FA8C16','#722ED1','#F97316','#0891B2'],btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
const DF={tasks:[{name:'需求评审',start:1,end:2},{name:'UI设计',start:2,end:4},{name:'前端开发',start:4,end:8},{name:'后端API',start:3,end:7},{name:'模型集成',start:5,end:9},{name:'测试回归',start:8,end:11},{name:'灰度上线',start:11,end:12}]};
let D=JSON.parse(JSON.stringify(DF)),mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
const weeks=Array.from({length:12},(_,i)=>`第${i+1}周`);
function buildOption(t){
  return{backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:p=>{const task=D.tasks[p[1].dataIndex];return `${task.name}<br/>第${task.start}周 → 第${task.end}周（共${task.end-task.start}周）`;}},grid:{left:90,right:20,top:20,bottom:40},xAxis:{type:'value',min:0,max:12,interval:1,axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor,formatter:v=>`第${v}周`},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}}},yAxis:{type:'category',data:D.tasks.map(d=>d.name),axisLine:{lineStyle:{color:t.border}},axisLabel:{color:t.textColor},axisTick:{show:false},inverse:true},series:[
    {name:'占位',type:'bar',stack:'task',data:D.tasks.map(d=>d.start-1),itemStyle:{color:'transparent'},barWidth:20},
    {name:'任务',type:'bar',stack:'task',data:D.tasks.map((d,i)=>({value:d.end-d.start,itemStyle:{color:t.s[i%6],borderRadius:[3,3,3,3]}})),barWidth:20,label:{show:true,position:'inside',color:'#fff',fontSize:11,formatter:p=>{const d=D.tasks[p.dataIndex];return d.name;}}}
  ]};
}
function renderTable(){const t=T[mode];document.getElementById('data-rows').innerHTML=D.tasks.map((d,i)=>`<tr><td><input value="${d.name}" oninput="D.tasks[${i}].name=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><input type="number" min="1" max="12" value="${d.start}" oninput="D.tasks[${i}].start=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><input type="number" min="1" max="12" value="${d.end}" oninput="D.tasks[${i}].end=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td></tr>`).join('');}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){D=JSON.parse(JSON.stringify(DF));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
renderTable();applyTheme('dark');
</script></body></html>
