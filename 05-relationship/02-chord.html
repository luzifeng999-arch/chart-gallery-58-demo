<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>弦图 Chord Diagram</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:16px;font-size:12px;color:var(--label);line-height:1.8}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">部门间协作关系弦图</div>
  <div class="chart-subtitle">弦的粗细=协作强度 · 颜色继承来源部门 · 核心洞察：研发与产品双向协作最密集</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>图表说明</h3><p>弦图 Chord Diagram</p></div>
  <div class="editor-body">
    弦图展示多对多关系的流量/权重：<br><br>
    • 圆弧上的节点=各部门<br>
    • 节点弧长=该部门总协作量<br>
    • 弦的粗细=两部门间协作强度<br>
    • 颜色继承来源节点<br><br>
    <b>适用场景：</b><br>
    · 部门/团队协作网络<br>
    · 国家间贸易流量<br>
    · 用户跨页面导航路径<br>
    · 基因共表达网络<br><br>
    使用 ECharts graph 类型模拟弦图效果。
  </div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',s:['#4D9EFF','#30D986','#FFB340','#9B7FFF','#FF8C42','#00D4D4'],btnSec:'#1A2236'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',s:['#2B7FFF','#00B96B','#FA8C16','#722ED1','#F97316','#0891B2'],btnSec:'#F0F4FA'}};
const DEPTS=['研发','产品','设计','运营','市场','数据'];
const MATRIX=[[0,95,70,30,20,65],[95,0,85,60,35,50],[70,85,0,55,40,45],[30,60,55,0,80,70],[20,35,40,80,0,55],[65,50,45,70,55,0]];
let mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildOption(t){
  const n=DEPTS.length;const r=0.65;
  const nodes=DEPTS.map((name,i)=>{const angle=(i/n*360-90)*Math.PI/180;return{name,x:Math.cos(angle)*r*200+250,y:Math.sin(angle)*r*200+250,itemStyle:{color:t.s[i]},symbolSize:40,label:{color:t.textColor}};});
  const links=[];
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){if(MATRIX[i][j]>0)links.push({source:DEPTS[i],target:DEPTS[j],value:MATRIX[i][j],lineStyle:{width:Math.max(1,MATRIX[i][j]/15),color:t.s[i]+'88',curveness:0.3}});}
  return{backgroundColor:'transparent',tooltip:{trigger:'item',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:p=>p.dataType==='edge'?`${p.data.source} ↔ ${p.data.target}<br/>协作强度：${p.data.value}`:p.data.name},series:[{type:'graph',layout:'none',roam:true,data:nodes,links,label:{show:true,position:'right',fontSize:12},lineStyle:{opacity:0.8},emphasis:{focus:'adjacency',lineStyle:{width:4}},itemStyle:{borderColor:t.bg,borderWidth:2}}]};}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){chart.setOption(buildOption(T[mode]),true);showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
applyTheme('dark');
</script></body></html>
