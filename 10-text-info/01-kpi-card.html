<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>KPI卡片 KPI Card</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF;--positive:#30D986;--negative:#FF6B6B}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF;--positive:#00B96B;--negative:#F5222D}
.chart-area{flex:1;display:flex;justify-content:center;align-items:center;padding:24px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;width:100%;max-width:900px}
.kpi-card{background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;transition:all .3s}
.kpi-label{color:var(--label);font-size:13px;font-weight:500;margin-bottom:10px}
.kpi-value{color:var(--title);font-size:36px;font-weight:700;margin-bottom:8px}
.kpi-trend{font-size:13px;font-weight:600}
.kpi-trend.positive{color:var(--positive)}
.kpi-trend.negative{color:var(--negative)}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:background .3s,border-color .3s}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title);transition:color .3s}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px;transition:color .3s}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border);transition:color .3s,border-color .3s}
td{padding:5px 4px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none;transition:all .2s}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
.add-row{width:100%;margin-top:10px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.add-row:hover{border-color:var(--input-focus);color:var(--input-focus)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 4px;transition:color .2s}
.del-btn:hover{color:#FF6B6B}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="cards-grid" id="cards-container"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>KPI数据编辑</h3><p>修改后点击「应用」刷新卡片</p></div>
  <div class="editor-body">
    <table><thead><tr><th>标题</th><th>数值</th><th>趋势</th><th></th></tr></thead><tbody id="data-rows"></tbody></table>
    <button class="add-row" onclick="addRow()">＋ 添加卡片</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES = {
  dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',title:'#F0F4FF',text:'#C8D4E8',label:'#5A6A84',btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF',positive:'#30D986',negative:'#FF6B6B'},
  light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',title:'#0D1525',text:'#2D3A4A',label:'#8A9BB0',btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF',positive:'#00B96B',negative:'#F5222D'}
};
const DEFAULT_DATA = [
  {label:'月度GMV',value:'¥2.8亿',trend:'+18.5%'},
  {label:'活跃用户',value:'15.2万',trend:'+12.3%'},
  {label:'转化率',value:'8.5%',trend:'-2.1%'},
  {label:'客单价',value:'¥128',trend:'+5.8%'}
];
let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let mode = 'dark';

function renderCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = DATA.map(d => {
    const trendClass = d.trend.startsWith('+') ? 'positive' : 'negative';
    const trendIcon = d.trend.startsWith('+') ? '↗' : '↘';
    return `<div class="kpi-card">
      <div class="kpi-label">${d.label}</div>
      <div class="kpi-value">${d.value}</div>
      <div class="kpi-trend ${trendClass}">${trendIcon} ${d.trend}</div>
    </div>`;
  }).join('');
}

function renderTable(){
  const t = THEMES[mode];
  document.getElementById('data-rows').innerHTML = DATA.map((d,i)=>`<tr>
    <td><input value="${d.label}" oninput="DATA[${i}].label=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.text}"></td>
    <td><input value="${d.value}" oninput="DATA[${i}].value=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.text}"></td>
    <td><input value="${d.trend}" oninput="DATA[${i}].trend=this.value" style="width:60px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.text}"></td>
    <td><button class="del-btn" onclick="removeRow(${i})">×</button></td>
  </tr>`).join('');
}
function removeRow(i){DATA.splice(i,1);renderTable();renderCards();}
function addRow(){DATA.push({label:'新指标',value:'0',trend:'+0%'});renderTable();renderCards();}
function applyData(){renderCards();showToast('✓ 已更新');}
function resetData(){DATA=JSON.parse(JSON.stringify(DEFAULT_DATA));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){
  const t=THEMES[m];
  document.documentElement.className=m==='light'?'theme-light':'';
  document.querySelector('.editor').style.background=t.panelBg;
  document.querySelector('.editor').style.borderColor=t.border;
  const btn=document.getElementById('theme-btn');
  if(btn){btn.style.background=t.btnSec;btn.style.color=t.text;btn.style.borderColor=t.border;}
  renderTable();renderCards();
}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);const btn=document.getElementById('theme-btn');if(btn)btn.textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
window.addEventListener('message',function(e){if(e.data&&e.data.type==='setTheme'){mode=e.data.theme;applyTheme(mode);var btn=document.getElementById('theme-btn');if(btn)btn.style.display='none';}});
renderTable();renderCards();
</script>
</body>
</html>
