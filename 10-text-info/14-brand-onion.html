<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>品牌洋葱 Brand Onion</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s;overflow:hidden}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:20px;min-width:0;overflow:hidden}
.chart-title{font-size:17px;font-weight:700;color:var(--title);margin-bottom:2px;outline:none}
.chart-subtitle{font-size:12px;color:var(--label);margin-bottom:14px}
.onion-wrapper{flex:1;display:flex;gap:20px;min-height:0}
.onion-svg-area{flex:1;display:flex;align-items:center;justify-content:center;min-width:0}
.onion-legend{width:220px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-right:4px}
.legend-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.legend-item:hover,.legend-item.active{border-color:var(--input-focus)}
.legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:1px}
.legend-text{flex:1}
.legend-layer{font-size:10px;font-weight:700;letter-spacing:.3px;color:var(--label);margin-bottom:2px}
.legend-name{font-size:13px;font-weight:700;color:var(--title);margin-bottom:2px}
.legend-desc{font-size:11px;color:var(--text);line-height:1.4}
.editor{width:260px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.editor-header{padding:14px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:3px}
.editor-body{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:10px}
.layer-edit{padding:8px;background:#0A1020;border-radius:6px;border:1px solid var(--border)}
.theme-light .layer-edit{background:#F8FAFC}
.layer-edit-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.layer-dot-sm{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.layer-edit-name{font-size:11px;font-weight:700;color:var(--title)}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-group label{font-size:10px;font-weight:700;color:var(--label);letter-spacing:.3px}
.field-group input,.field-group textarea{background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 7px;border-radius:4px;font-size:11px;outline:none;width:100%;resize:none}
.field-group input:focus,.field-group textarea:focus{border-color:var(--input-focus)}
.editor-footer{padding:10px 14px;display:flex;gap:8px;border-top:1px solid var(--border);flex-shrink:0}
.btn{flex:1;padding:6px 0;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border)}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false">品牌洋葱模型</div>
  <div class="chart-subtitle">Brand Onion · 由内核向外层扩展的品牌层次架构</div>
  <div class="onion-wrapper">
    <div class="onion-svg-area">
      <svg id="onion-svg" viewBox="-200 -200 400 400" style="width:100%;height:100%;max-width:420px;max-height:420px"></svg>
    </div>
    <div class="onion-legend" id="onion-legend"></div>
  </div>
</div>
<div class="editor">
  <div class="editor-header"><h3>洋葱编辑</h3><p>从内到外编辑各层</p></div>
  <div class="editor-body" id="editor-body"></div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const LAYER_COLORS=['#FF6B6B','#FFB340','#4D9EFF','#30D986','#9B7FFF'];
const DEFAULT_LAYERS=[
  {layer:'最内核',name:'使命',desc:'我们存在的根本原因：赋予创作者真正的自由与力量'},
  {layer:'核心层',name:'价值观',desc:'我们信仰的原则：创新、简洁、开放、信任'},
  {layer:'个性层',name:'品牌个性',desc:'我们的气质：年轻、专业、富有创意、温暖而不失锋芒'},
  {layer:'声音层',name:'品牌声音',desc:'我们的沟通方式：直接、启发性、专业又平易近人'},
  {layer:'外表层',name:'外部形象',desc:'视觉标识：品牌色彩、字体、图形、UI风格、包装'},
];
let layers=JSON.parse(JSON.stringify(DEFAULT_LAYERS));
let activeIdx=-1;

function renderSVG(){
  const svg=document.getElementById('onion-svg');
  const n=layers.length;
  const maxR=180;
  const rings=layers.map((_,i)=>({r:maxR*(1-(i/n)*(0.7)),idx:i})).reverse();
  let html='';
  rings.forEach(({r,idx})=>{
    const c=LAYER_COLORS[idx]||'#888';
    const opacity=0.12+(idx/(n-1))*0.08;
    html+=`<circle cx="0" cy="0" r="${r}" fill="${c}" fill-opacity="${opacity}" stroke="${c}" stroke-opacity=".3" stroke-width="1.5" style="cursor:pointer" onclick="selectLayer(${idx})"/>`;
  });
  // Labels
  layers.forEach((l,i)=>{
    const totalR=maxR*(1-(i/n)*0.7);
    const prevR=i>0?maxR*(1-((i-1)/n)*0.7):0;
    const midR=(totalR+prevR)/2;
    const c=LAYER_COLORS[i];
    html+=`<text x="0" y="${-midR+5}" text-anchor="middle" fill="${c}" font-size="11" font-weight="700" font-family="PingFang SC,sans-serif" style="cursor:pointer" onclick="selectLayer(${i})">${l.name}</text>`;
  });
  svg.innerHTML=html;
}

function renderLegend(){
  const el=document.getElementById('onion-legend');
  el.innerHTML=layers.map((l,i)=>`
    <div class="legend-item ${activeIdx===i?'active':''}" onclick="selectLayer(${i})" style="${activeIdx===i?'background:rgba(77,158,255,0.06)':''}">
      <div class="legend-dot" style="background:${LAYER_COLORS[i]}"></div>
      <div class="legend-text">
        <div class="legend-layer">${l.layer}</div>
        <div class="legend-name">${l.name}</div>
        <div class="legend-desc">${l.desc}</div>
      </div>
    </div>`).join('');
}

function selectLayer(i){
  activeIdx=activeIdx===i?-1:i;
  renderLegend();
  renderSVG();
}

function buildEditor(){
  document.getElementById('editor-body').innerHTML=layers.map((l,i)=>`
    <div class="layer-edit">
      <div class="layer-edit-header"><div class="layer-dot-sm" style="background:${LAYER_COLORS[i]}"></div><span class="layer-edit-name">${l.layer}</span></div>
      <div class="field-group"><label>层名</label><input id="e-lname${i}" value="${l.name}"></div>
      <div class="field-group"><label>描述</label><textarea id="e-ldesc${i}" rows="2">${l.desc}</textarea></div>
    </div>`).join('');
}

function applyData(){
  layers.forEach((l,i)=>{
    l.name=document.getElementById('e-lname'+i).value;
    l.desc=document.getElementById('e-ldesc'+i).value;
  });
  renderSVG();renderLegend();toast('已应用');
}
function resetData(){layers=JSON.parse(JSON.stringify(DEFAULT_LAYERS));buildEditor();renderSVG();renderLegend();toast('已重置');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2000);}
function toggleTheme(){const isLight=document.documentElement.classList.toggle('theme-light');document.getElementById('theme-btn').textContent=isLight?'🌑 暗色':'☀️ 亮色';}
window.addEventListener('message',e=>{if(e.data?.type==='setTheme'){const isLight=e.data.theme==='light';document.documentElement.classList.toggle('theme-light',isLight);document.getElementById('theme-btn').textContent=isLight?'🌑 暗色':'☀️ 亮色';}});
buildEditor();renderSVG();renderLegend();
</script>
</body>
</html>
