<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>金字塔模型 Pyramid Model</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px;outline:none}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#pyramid-wrap{flex:1;display:flex;align-items:center;justify-content:center}
#pyramid-svg{max-width:100%;max-height:100%}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
.layer-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:8px}
.layer-row input{flex:1;background:transparent;border:none;color:var(--text);font-size:12px;outline:none}
.layer-order{font-size:11px;color:var(--label);font-weight:700;min-width:18px}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0}
.del-btn:hover{color:#FF6B6B}
.add-row{width:100%;margin-top:8px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px}
.add-row:hover{border-color:var(--input-focus);color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.hint{font-size:11px;color:var(--label);margin-bottom:10px;line-height:1.5}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false">品牌建设层级金字塔</div>
  <div class="chart-subtitle">从基础到顶端的品牌建设阶梯模型 · 越往上越稀缺、越高价值</div>
  <div id="pyramid-wrap"><svg id="pyramid-svg" viewBox="0 0 500 420" xmlns="http://www.w3.org/2000/svg"></svg></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>层级编辑</h3><p>从底层到顶层排列（最多6层）</p></div>
  <div class="editor-body">
    <div class="hint">⬆ 顶层 = 最高价值<br>⬇ 底层 = 基础支撑</div>
    <div id="layer-rows"></div>
    <button class="add-row" onclick="addLayer()" id="add-btn">＋ 添加层级</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const DARK_COLORS = ['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF','#FF8C42'];
const LIGHT_COLORS = ['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1','#D46B08'];

// Bottom to top
const DEFAULT_LAYERS = [
  {text:'产品认知 · 基础曝光与品牌知名度建立',sub:''},
  {text:'产品联想 · 建立差异化的品牌属性认知',sub:''},
  {text:'品牌态度 · 消费者对品牌情感偏好形成',sub:''},
  {text:'品牌共鸣 · 深度认同感与社群归属',sub:''},
  {text:'品牌信仰 · 忠实拥护者自发传播',sub:''}
];
let LAYERS = JSON.parse(JSON.stringify(DEFAULT_LAYERS));
let mode = 'dark';

function renderSVG() {
  const svg = document.getElementById('pyramid-svg');
  const n = LAYERS.length;
  const W = 500, H = 420;
  const PAD = 30;
  const colors = mode === 'dark' ? DARK_COLORS : LIGHT_COLORS;
  const textColor = mode === 'dark' ? '#F0F4FF' : '#0D1525';
  const labelColor = mode === 'dark' ? '#C8D4E8' : '#2D3A4A';
  const borderColor = mode === 'dark' ? '#080C14' : '#F5F7FA';

  const totalH = H - PAD * 2;
  const layerH = totalH / n;
  let html = '';

  // Draw from bottom (index 0) to top
  for (let i = 0; i < n; i++) {
    const levelFromTop = n - 1 - i; // 0 = top
    const ratio_top = levelFromTop / n;
    const ratio_bot = (levelFromTop + 1) / n;
    const half_top = (W / 2 - PAD) * ratio_top;
    const half_bot = (W / 2 - PAD) * ratio_bot;
    const cx = W / 2;
    const y_top = PAD + levelFromTop * layerH;
    const y_bot = PAD + (levelFromTop + 1) * layerH;
    const color = colors[i % colors.length];
    const alpha = mode === 'dark' ? 'cc' : 'dd';

    html += `<polygon points="${cx - half_top},${y_top} ${cx + half_top},${y_top} ${cx + half_bot},${y_bot} ${cx - half_bot},${y_bot}" fill="${color}${alpha}" stroke="${borderColor}" stroke-width="2"/>`;

    const textY = (y_top + y_bot) / 2;
    const maxW = half_bot * 2 - 20;
    const fontSize = Math.min(13, Math.max(9, maxW / (LAYERS[i].text.length * 0.7)));
    html += `<text x="${cx}" y="${textY}" text-anchor="middle" dominant-baseline="middle" fill="${textColor}" font-size="${fontSize}" font-weight="600" font-family="PingFang SC,sans-serif">${LAYERS[i].text}</text>`;
  }

  // Top triangle cap
  const tipX = W / 2, tipY = PAD;
  svg.innerHTML = html;
}

function renderEditor() {
  const t_input = mode === 'dark' ? '#080C14' : '#FFFFFF';
  const t_border = mode === 'dark' ? '#1A2236' : '#D9E3EE';
  const t_text = mode === 'dark' ? '#C8D4E8' : '#2D3A4A';
  // Show reversed (top = highest index = first shown)
  const reversed = [...LAYERS].reverse();
  document.getElementById('layer-rows').innerHTML = reversed.map((d, ri) => {
    const i = LAYERS.length - 1 - ri;
    return `<div class="layer-row" style="border-color:${t_border}">
      <span class="layer-order">${i + 1}</span>
      <input value="${d.text}" placeholder="层级描述" oninput="LAYERS[${i}].text=this.value" style="color:${t_text}">
      <button class="del-btn" onclick="delLayer(${i})">×</button>
    </div>`;
  }).join('');
  document.getElementById('add-btn').style.display = LAYERS.length >= 6 ? 'none' : '';
}
function delLayer(i) { if (LAYERS.length > 2) { LAYERS.splice(i, 1); renderEditor(); renderSVG(); } }
function addLayer() { if (LAYERS.length < 6) { LAYERS.push({text:'新层级 · 描述此层次的含义'}); renderEditor(); renderSVG(); } }
function applyData() { renderSVG(); showToast('✓ 已更新'); }
function resetData() { LAYERS = JSON.parse(JSON.stringify(DEFAULT_LAYERS)); renderEditor(); renderSVG(); showToast('↺ 已重置'); }
function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 1800); }
function applyTheme(m) {
  document.documentElement.className = m === 'light' ? 'theme-light' : '';
  document.querySelector('.editor').style.background = m === 'light' ? '#FFFFFF' : '#0E1420';
  document.querySelector('.editor').style.borderColor = m === 'light' ? '#E1E8F0' : '#1A2236';
  const btn = document.getElementById('theme-btn');
  if (btn) { btn.style.background = m === 'light' ? '#F0F4FA' : '#1A2236'; btn.style.color = m === 'light' ? '#2D3A4A' : '#C8D4E8'; btn.style.borderColor = m === 'light' ? '#E1E8F0' : '#1A2236'; }
  renderEditor(); renderSVG();
}
function toggleTheme() { mode = mode === 'dark' ? 'light' : 'dark'; applyTheme(mode); const btn = document.getElementById('theme-btn'); if (btn) btn.textContent = mode === 'dark' ? '☀️ 亮色' : '🌑 暗色'; }
window.addEventListener('message', function(e) { if (e.data && e.data.type === 'setTheme') { mode = e.data.theme; applyTheme(mode); var btn = document.getElementById('theme-btn'); if (btn) btn.style.display = 'none'; } });
renderSVG(); renderEditor();
</script>
</body>
</html>
