<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>词云 Word Cloud</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);padding:4px 0;margin-bottom:4px;outline:none}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#word-canvas{flex:1;position:relative;overflow:hidden}
.word-item{position:absolute;cursor:pointer;transition:transform .2s,opacity .2s;white-space:nowrap;line-height:1;transform-origin:center;user-select:none}
.word-item:hover{transform:scale(1.15)!important;opacity:1!important;z-index:10}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:4px 3px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 5px;border-radius:4px;font-size:12px;outline:none}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
.add-row{width:100%;margin-top:8px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px}
.add-row:hover{border-color:var(--input-focus);color:var(--input-focus)}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0}
.del-btn:hover{color:#FF6B6B}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.insight-box{background:rgba(77,158,255,0.08);border:1px solid rgba(77,158,255,0.2);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.insight-box p{font-size:12px;color:var(--text);line-height:1.6}
.insight-title{font-size:11px;color:#4D9EFF;font-weight:600;margin-bottom:4px}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false">2024年AI领域高频词云</div>
  <div class="chart-subtitle">基于1000篇AI技术文章的关键词频率分析 · 字体越大出现频率越高</div>
  <div id="word-canvas"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>词语 + 权重（影响字号大小）</p></div>
  <div class="editor-body">
    <div class="insight-box">
      <div class="insight-title">💡 核心洞察</div>
      <p>「大模型」「LLM」「智能体」位列前三；「多模态」「RAG」「提示词」为2024年新兴高频词；传统ML词频显著下降。</p>
    </div>
    <table>
      <thead><tr><th>词语</th><th>权重</th><th></th></tr></thead>
      <tbody id="data-rows"></tbody>
    </table>
    <button class="add-row" onclick="addRow()">＋ 添加词语</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES = {
  dark:{colors:['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF','#FF8C42','#00D4D4','#7EF5A0','#F5A623','#BD10E0'],bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',btnSec:'#1A2236',textColor:'#C8D4E8',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},
  light:{colors:['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1','#D46B08','#08979C','#389E0D','#C41D7F','#1D39C4'],bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',btnSec:'#F0F4FA',textColor:'#2D3A4A',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}
};
const DEFAULT_DATA = [
  {word:'大模型',weight:95},{word:'LLM',weight:88},{word:'智能体',weight:82},{word:'Agent',weight:78},
  {word:'多模态',weight:74},{word:'RAG',weight:70},{word:'提示词',weight:66},{word:'微调',weight:62},
  {word:'向量数据库',weight:58},{word:'GPT-4',weight:55},{word:'Claude',weight:52},{word:'Gemini',weight:48},
  {word:'推理',weight:44},{word:'知识图谱',weight:42},{word:'Transformer',weight:40},{word:'注意力机制',weight:38},
  {word:'具身智能',weight:35},{word:'RLHF',weight:32},{word:'量化',weight:30},{word:'幻觉',weight:28},
  {word:'涌现',weight:26},{word:'对齐',weight:24},{word:'安全',weight:22},{word:'评测',weight:20},
  {word:'开源',weight:18},{word:'部署',weight:16},{word:'推理速度',weight:14},{word:'上下文',weight:12}
];
let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let mode = 'dark';

function renderWordCloud() {
  const container = document.getElementById('word-canvas');
  const W = container.clientWidth, H = container.clientHeight;
  if (!W || !H) return;
  const t = THEMES[mode];
  const maxW = Math.max(...DATA.map(d => d.weight));
  const minW = Math.min(...DATA.map(d => d.weight));
  const sorted = [...DATA].sort((a,b) => b.weight - a.weight);
  const placed = [];
  container.innerHTML = '';

  sorted.forEach((d, idx) => {
    const ratio = (d.weight - minW) / (maxW - minW + 1);
    const fontSize = Math.round(12 + ratio * 44);
    const color = t.colors[idx % t.colors.length];
    const rotate = (Math.random() > 0.8) ? (Math.random() > 0.5 ? 30 : -30) : 0;
    const el = document.createElement('span');
    el.className = 'word-item';
    el.textContent = d.word;
    el.style.cssText = `font-size:${fontSize}px;color:${color};font-weight:${ratio > 0.6 ? 700 : 500};transform:rotate(${rotate}deg);opacity:${0.7 + ratio * 0.3}`;
    el.title = `${d.word}: 权重 ${d.weight}`;
    container.appendChild(el);

    const eW = el.offsetWidth || d.word.length * fontSize * 0.65;
    const eH = el.offsetHeight || fontSize * 1.2;
    let placed_ok = false;
    const cx = W / 2, cy = H / 2;
    for (let r = 0; r < Math.max(W, H); r += 5) {
      for (let angle = 0; angle < Math.PI * 2; angle += 0.3 / (r / 10 + 1)) {
        const x = cx + r * Math.cos(angle) - eW / 2;
        const y = cy + r * Math.sin(angle) - eH / 2;
        if (x < 0 || y < 0 || x + eW > W || y + eH > H) continue;
        let overlap = false;
        for (const p of placed) {
          if (x < p.x + p.w + 4 && x + eW + 4 > p.x && y < p.y + p.h + 4 && y + eH + 4 > p.y) { overlap = true; break; }
        }
        if (!overlap) {
          el.style.left = x + 'px'; el.style.top = y + 'px';
          placed.push({x, y, w: eW, h: eH});
          placed_ok = true; break;
        }
      }
      if (placed_ok) break;
    }
    if (!placed_ok) el.style.display = 'none';
  });
}

function renderTable() {
  const t = THEMES[mode];
  document.getElementById('data-rows').innerHTML = DATA.map((d, i) => `<tr>
    <td><input value="${d.word}" oninput="DATA[${i}].word=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input type="number" value="${d.weight}" min="1" max="100" oninput="DATA[${i}].weight=+this.value" style="width:50px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><button class="del-btn" onclick="removeRow(${i})">×</button></td>
  </tr>`).join('');
}
function removeRow(i) { DATA.splice(i, 1); renderTable(); }
function addRow() { DATA.push({word:'新词', weight:30}); renderTable(); }
function applyData() { renderWordCloud(); showToast('✓ 已更新'); }
function resetData() { DATA = JSON.parse(JSON.stringify(DEFAULT_DATA)); renderTable(); renderWordCloud(); showToast('↺ 已重置'); }
function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 1800); }
function applyTheme(m) {
  document.documentElement.className = m === 'light' ? 'theme-light' : '';
  const t = THEMES[m];
  document.querySelector('.editor').style.background = t.panelBg;
  document.querySelector('.editor').style.borderColor = t.border;
  const btn = document.getElementById('theme-btn');
  if (btn) { btn.style.background = t.btnSec; btn.style.color = t.textColor; btn.style.borderColor = t.border; }
  renderTable(); renderWordCloud();
}
function toggleTheme() { mode = mode === 'dark' ? 'light' : 'dark'; applyTheme(mode); const btn = document.getElementById('theme-btn'); if (btn) btn.textContent = mode === 'dark' ? '☀️ 亮色' : '🌑 暗色'; }
window.addEventListener('resize', renderWordCloud);
window.addEventListener('message', function(e) { if (e.data && e.data.type === 'setTheme') { mode = e.data.theme; applyTheme(mode); var btn = document.getElementById('theme-btn'); if (btn) btn.style.display = 'none'; } });
renderTable();
setTimeout(renderWordCloud, 50);
</script>
</body>
</html>
