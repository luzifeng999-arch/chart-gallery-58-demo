<!DOCTYPE html><html><head><meta charset="UTF-8"><title>仪表盘 Gauge</title><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><style>body{margin:0;background:#080C14}#c{width:100vw;height:100vh}</style></head><body><div id="c"></div><script>echarts.init(document.getElementById('c')).setOption({series:[{type:'gauge',progress:{show:true,width:18,itemStyle:{color:'#30D986'}},axisLine:{lineStyle:{width:18,color:[[1,'#1A2236']]}},axisTick:{show:false},splitLine:{show:false},axisLabel:{color:'#5A6A84',fontSize:12},detail:{valueAnimation:true,formatter:'{value}%',color:'#F0F4FF',fontSize:32},data:[{value:75,name:'完成度'}]}]});</script></body></html>
