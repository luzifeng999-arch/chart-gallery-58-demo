<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>品牌架构图 Brand Architecture</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s;overflow:hidden}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF;--master:#FFB340;--sub:#4D9EFF;--prod:#30D986;--line:#2D3A50}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF;--master:#FA8C16;--sub:#1677FF;--prod:#00B96B;--line:#C8D4E0}
.chart-area{flex:1;display:flex;flex-direction:column;padding:20px;min-width:0;overflow:hidden}
.chart-title{font-size:17px;font-weight:700;color:var(--title);margin-bottom:2px;outline:none}
.chart-subtitle{font-size:12px;color:var(--label);margin-bottom:14px}
.arch-container{flex:1;overflow:auto;position:relative}
.arch-wrap{display:flex;flex-direction:column;align-items:center;gap:0;padding:16px;min-width:600px}
/* 母品牌 */
.master-brand{background:linear-gradient(135deg,rgba(255,179,64,0.15),rgba(255,179,64,0.08));border:2px solid rgba(255,179,64,0.4);border-radius:16px;padding:16px 40px;text-align:center;position:relative;cursor:pointer;transition:all .2s;min-width:200px}
.master-brand:hover{border-color:rgba(255,179,64,0.7);transform:translateY(-2px)}
.brand-type-tag{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px;display:block;color:var(--master);opacity:.8}
.brand-name{font-size:16px;font-weight:700;color:var(--title)}
.brand-desc{font-size:11px;color:var(--label);margin-top:3px}
.arch-mode-bar{display:flex;align-items:center;gap:6px;margin:10px 0;background:var(--panel-bg);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--label)}
.mode-dot{width:8px;height:8px;border-radius:50%;background:var(--master)}
/* 连接线 */
.connector-v{width:2px;height:20px;background:var(--line);margin:0 auto;border-radius:1px}
.connector-h-wrap{display:flex;align-items:flex-start;position:relative;width:100%}
.connector-h-line{flex:1;height:2px;background:var(--line);margin-top:20px}
/* 子品牌行 */
.sub-brands-row{display:flex;gap:16px;align-items:flex-start;width:100%}
.sub-brand-col{display:flex;flex-direction:column;align-items:center;gap:0;flex:1}
.sub-brand-node{background:rgba(77,158,255,0.08);border:1.5px solid rgba(77,158,255,0.3);border-radius:12px;padding:12px 20px;text-align:center;cursor:pointer;transition:all .2s;width:100%;max-width:180px}
.sub-brand-node:hover{border-color:rgba(77,158,255,0.6);transform:translateY(-2px)}
.sub-brand-node .brand-name{font-size:13px;color:var(--sub)}
.sub-brand-node .brand-desc{font-size:10px}
/* 产品行 */
.products-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px;padding:0 4px}
.product-node{background:rgba(48,217,134,0.07);border:1px solid rgba(48,217,134,0.2);border-radius:8px;padding:7px 14px;text-align:center;cursor:pointer;transition:all .15s;font-size:11px;font-weight:600;color:var(--prod);white-space:nowrap}
.product-node:hover{border-color:rgba(48,217,134,0.5);background:rgba(48,217,134,0.12)}
/* 图例 */
.arch-legend{display:flex;gap:16px;margin-top:10px;padding:8px 16px;background:var(--panel-bg);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap=6px;font-size:11px;color:var(--label);gap:5px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.editor{width:260px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.editor-header{padding:14px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:3px}
.editor-body{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.section-hdr{font-size:10px;font-weight:700;color:var(--label);letter-spacing:.3px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:4px}
.section-hdr:first-child{border-top:none;margin-top:0;padding-top:0}
.field-group{display:flex;flex-direction:column;gap:4px}
.field-group label{font-size:10px;font-weight:700;color:var(--label)}
.field-group input{background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 7px;border-radius:4px;font-size:11px;outline:none;width:100%}
.field-group input:focus{border-color:var(--input-focus)}
.sub-edit{padding:8px;background:#0A1020;border-radius:6px;border:1px solid var(--border);margin-bottom:6px}
.theme-light .sub-edit{background:#F8FAFC}
.sub-edit-name{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px}
.prod-inputs{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.prod-row{display:flex;gap:4px}
.prod-row input{flex:1;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:11px;outline:none}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:12px;padding:0 2px}
.del-btn:hover{color:#FF6B6B}
.add-btn{width:100%;padding:4px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:4px;cursor:pointer;font-size:10px;margin-top:3px}
.add-btn:hover{border-color:var(--input-focus);color:var(--input-focus)}
.editor-footer{padding:10px 14px;display:flex;gap:8px;border-top:1px solid var(--border);flex-shrink:0}
.btn{flex:1;padding:6px 0;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border)}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false">科技集团品牌架构图</div>
  <div class="chart-subtitle">Brand Architecture · 母品牌-子品牌-产品层级关系 · Branded House模式</div>
  <div class="arch-container">
    <div class="arch-wrap" id="arch-wrap"></div>
  </div>
</div>
<div class="editor">
  <div class="editor-header"><h3>架构编辑</h3><p>编辑品牌层级结构</p></div>
  <div class="editor-body" id="editor-body"></div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const DEFAULT={
  master:{name:'TechGroup 科技集团',desc:'母品牌 · 统一价值主张',mode:'Branded House（品牌联结型）'},
  subs:[
    {name:'TechGroup AI',desc:'AI产品线',products:['TG-Writer AI写作','TG-Vision 图像生成','TG-Code 代码助手']},
    {name:'TechGroup Cloud',desc:'云服务产品线',products:['TG-Storage 存储','TG-Compute 计算','TG-DB 数据库']},
    {name:'TechGroup Tools',desc:'效率工具线',products:['TG-Sheet 表格','TG-Docs 文档','TG-Flow 流程']},
  ]
};
let state=JSON.parse(JSON.stringify(DEFAULT));

function render(){
  const w=document.getElementById('arch-wrap');
  const subCols=state.subs.map(sub=>{
    const prods=sub.products.map(p=>`<div class="product-node">${p}</div>`).join('');
    return `<div class="sub-brand-col">
      <div class="connector-v"></div>
      <div class="sub-brand-node"><span class="brand-type-tag">Sub Brand</span><div class="brand-name">${sub.name}</div><div class="brand-desc">${sub.desc}</div></div>
      ${sub.products.length?`<div class="connector-v"></div><div class="products-row">${prods}</div>`:''}
    </div>`;
  }).join('');

  w.innerHTML=`
    <div class="master-brand"><span class="brand-type-tag">Master Brand</span><div class="brand-name">${state.master.name}</div><div class="brand-desc">${state.master.desc}</div></div>
    <div class="arch-mode-bar"><div class="mode-dot"></div><span>${state.master.mode}</span></div>
    <div class="connector-v" style="height:16px"></div>
    <div style="display:flex;width:100%;position:relative">
      <div style="position:absolute;top:20px;left:10%;right:10%;height:2px;background:var(--line);border-radius:1px"></div>
    </div>
    <div class="sub-brands-row">${subCols}</div>
    <div class="arch-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--master)"></div><span>母品牌 Master Brand</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--sub)"></div><span>子品牌 Sub Brand</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--prod)"></div><span>产品 Product</span></div>
    </div>
  `;
}

function buildEditor(){
  let html=`<div class="section-hdr">母品牌</div>
    <div class="field-group"><label>品牌名称</label><input id="e-mname" value="${state.master.name}"></div>
    <div class="field-group"><label>品牌描述</label><input id="e-mdesc" value="${state.master.desc}"></div>
    <div class="field-group"><label>架构模式</label><input id="e-mode" value="${state.master.mode}"></div>
    <div class="section-hdr">子品牌</div>`;
  state.subs.forEach((sub,i)=>{
    const pInputs=sub.products.map((p,j)=>`<div class="prod-row"><input id="e-p${i}_${j}" value="${p}"><button class="del-btn" onclick="removeProd(${i},${j})">✕</button></div>`).join('');
    html+=`<div class="sub-edit"><div class="sub-edit-name">子品牌 ${i+1}</div>
      <div class="field-group"><label>品牌名</label><input id="e-sname${i}" value="${sub.name}"></div>
      <div class="field-group"><label>描述</label><input id="e-sdesc${i}" value="${sub.desc}"></div>
      <label style="font-size:10px;font-weight:700;color:var(--label)">产品列表</label>
      <div class="prod-inputs">${pInputs}</div>
      <button class="add-btn" onclick="addProd(${i})">+ 添加产品</button>
    </div>`;
  });
  document.getElementById('editor-body').innerHTML=html;
}

function addProd(si){state.subs[si].products.push('新产品');buildEditor();render();}
function removeProd(si,pi){state.subs[si].products.splice(pi,1);buildEditor();render();}
function applyData(){
  state.master.name=document.getElementById('e-mname').value;
  state.master.desc=document.getElementById('e-mdesc').value;
  state.master.mode=document.getElementById('e-mode').value;
  state.subs.forEach((sub,i)=>{
    sub.name=document.getElementById('e-sname'+i).value;
    sub.desc=document.getElementById('e-sdesc'+i).value;
    sub.products=sub.products.map((_,j)=>document.getElementById(`e-p${i}_${j}`).value).filter(Boolean);
  });
  render();toast('已应用');
}
function resetData(){state=JSON.parse(JSON.stringify(DEFAULT));buildEditor();render();toast('已重置');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2000);}
function toggleTheme(){const isLight=document.documentElement.classList.toggle('theme-light');document.getElementById('theme-btn').textContent=isLight?'🌑 暗色':'☀️ 亮色';}
window.addEventListener('message',e=>{if(e.data?.type==='setTheme'){const isLight=e.data.theme==='light';document.documentElement.classList.toggle('theme-light',isLight);document.getElementById('theme-btn').textContent=isLight?'🌑 暗色':'☀️ 亮色';}});
buildEditor();render();
</script>
</body>
</html>
