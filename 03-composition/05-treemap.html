<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>矩形树图 Treemap</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:16px;font-size:12px;color:var(--label);line-height:1.8}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">全球股票市值分布（矩形树图）</div>
  <div class="chart-subtitle">面积=市值大小 · 颜色=涨跌方向 · 暖色上涨/冷色下跌 · 点击下钻</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>图表说明</h3><p>层级面积构成</p></div>
  <div class="editor-body">矩形树图（Treemap）：<br><br>
    • 高效利用空间展示层级构成<br>
    • 面积大小编码数值（市值）<br>
    • 颜色编码变化方向（正/负）<br>
    • 支持多层级下钻查看<br><br>
    <b>暖色</b>（橙/绿）= 上涨区块<br>
    <b>冷色</b>（蓝/紫）= 下跌区块<br><br>
    点击区块可下钻，右键/面包屑可返回。
  </div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',positive:'#30D986',negative:'#FF6B6B',s:['#4D9EFF','#30D986','#FFB340','#9B7FFF','#FF8C42','#00D4D4'],btnSec:'#1A2236'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',positive:'#00B96B',negative:'#F5222D',s:['#2B7FFF','#00B96B','#FA8C16','#722ED1','#F97316','#0891B2'],btnSec:'#F0F4FA'}};
let mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildData(t){
  const items=[{name:'苹果 AAPL',value:2800,change:2.3},{name:'微软 MSFT',value:2600,change:1.8},{name:'英伟达 NVDA',value:1800,change:5.2},{name:'Alphabet',value:1700,change:-0.5},{name:'亚马逊',value:1600,change:1.2},{name:'Meta',value:1200,change:3.1},{name:'特斯拉',value:800,change:-2.3},{name:'台积电',value:750,change:1.5},{name:'三星',value:620,change:-1.1},{name:'腾讯',value:580,change:0.8},{name:'阿里巴巴',value:350,change:-3.2},{name:'百度',value:180,change:-1.5}];
  const top=items[0];
  return items.map((d,i)=>({name:`${d.name}\n${d.change>0?'+':''}${d.change}%`,value:d.value,itemStyle:{color:d.change>0?(d.change>3?t.positive:t.positive+'aa'):(d.change<-2?t.negative:t.negative+'aa'),shadowBlur:i===0?15:0,shadowColor:i===0?(t.positive+'88'):'transparent',borderWidth:i===0?3:2,borderColor:i===0?t.positive+'cc':t.bg},label:{show:true,formatter:i===0?`{name|★ ${d.name}}\n{value|$${d.value}B}\n{change|${d.change>0?'+':''}${d.change}%}`:`{name|${d.name}}\n{change|${d.change>0?'+':''}${d.change}%}`,rich:{name:{color:'#fff',fontSize:i===0?13:12,fontWeight:i===0?700:600},value:{color:'#fff',fontSize:12,fontWeight:700,padding:[2,0,0,0]},change:{color:'#fff',fontSize:11}}}}));
}
function buildOption(t){return{backgroundColor:'transparent',tooltip:{trigger:'item',formatter:p=>`<b>${p.name.split('\n')[0]}</b><br/>市值：<b style="color:${t.positive}">$${p.value}B</b><br/>涨跌：<b style="color:${p.name.split('\n')[1].startsWith('+')?t.positive:t.negative}">${p.name.split('\n')[1]}</b><br/><span style="color:#999">点击可下钻查看详情</span>`,backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor}},series:[{type:'treemap',data:buildData(t),width:'100%',height:'100%',roam:false,upperLabel:{show:true,color:t.textColor,height:30},itemStyle:{gapWidth:2},breadcrumb:{itemStyle:{color:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor}}},levels:[{itemStyle:{borderWidth:3,gapWidth:3}}]}]};}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){chart.setOption(buildOption(T[mode]),true);showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
