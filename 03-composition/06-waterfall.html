<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>瀑布图 Waterfall Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:12px 16px}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}table{width:100%;border-collapse:collapse;font-size:12px}th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}td{padding:5px 4px}td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 5px;border-radius:4px;font-size:11px;outline:none}td input:focus{border-color:var(--input-focus)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">净利润桥接分析（瀑布图）</div>
  <div class="chart-subtitle">从收入到净利润的逐步推导 · 核心洞察：运营成本是最大侵蚀项</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>增减累计（正=增，负=减）</p></div>
  <div class="editor-body"><table><thead><tr><th>项目</th><th>变化量</th><th>类型</th></tr></thead><tbody id="data-rows"></tbody></table></div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',positive:'#30D986',negative:'#FF6B6B',total:'#4D9EFF',btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',positive:'#00B96B',negative:'#F5222D',total:'#2B7FFF',btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
const DF={items:[{name:'总收入',value:5000,type:'total'},{name:'销售成本',value:-1800,type:'neg'},{name:'毛利润',value:0,type:'total'},{name:'营销费用',value:-600,type:'neg'},{name:'研发投入',value:-450,type:'neg'},{name:'运营成本',value:-820,type:'neg'},{name:'其他收入',value:180,type:'pos'},{name:'净利润',value:0,type:'total'}]};
let D=JSON.parse(JSON.stringify(DF)),mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function calcWaterfall(){
  let running=0;const placeholders=[],bars=[];
  D.items.forEach((item,i)=>{
    if(item.type==='total'){
      placeholders.push(0);bars.push({value:running,type:'total'});
      if(i>0)item.value=running;
    } else {
      const v=item.value;
      const base=v<0?running+v:running;
      placeholders.push(base);bars.push({value:Math.abs(v),type:item.type});
      running+=v;
    }
  });
  return{placeholders,bars};
}
function buildOption(t){
  const{placeholders,bars}=calcWaterfall();
  return{backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:params=>{const i=params[1].dataIndex;const item=D.items[i];return `${item.name}<br/>金额：<b>${item.type==='neg'?'-':''}${Math.abs(item.value||bars[i].value)}万</b>`;}},grid:{left:60,right:20,top:20,bottom:40},xAxis:{type:'category',data:D.items.map(d=>d.name),axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor,fontSize:11},axisTick:{show:false}},yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor,formatter:v=>v+'万'}},series:[
    {name:'占位',type:'bar',stack:'wf',data:placeholders,itemStyle:{color:'transparent'},silent:true},
    {name:'值',type:'bar',stack:'wf',barMaxWidth:50,data:bars.map(b=>({value:b.value,itemStyle:{color:b.type==='total'?t.total:b.type==='pos'?t.positive:t.negative,borderRadius:[4,4,0,0]}})),label:{show:true,position:'top',color:t.textColor,formatter:p=>{const item=D.items[p.dataIndex];return (item.type==='neg'?'-':'')+Math.abs(item.value||p.value);}}}
  ]};
}
function renderTable(){
  const t=T[mode];
  document.getElementById('data-rows').innerHTML=D.items.map((d,i)=>`<tr>
    <td><input value="${d.name}" oninput="D.items[${i}].name=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input type="number" value="${d.value}" oninput="D.items[${i}].value=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}" ${d.type==='total'?'disabled':''} ></td>
    <td style="color:${d.type==='total'?t.total:d.type==='pos'?t.positive:t.negative};font-size:11px">${d.type==='total'?'合计':d.type==='pos'?'增加':'减少'}</td>
  </tr>`).join('');
}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){D=JSON.parse(JSON.stringify(DF));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
renderTable();applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
