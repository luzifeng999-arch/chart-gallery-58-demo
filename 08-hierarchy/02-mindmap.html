<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>思维导图</title><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><style>body{margin:0;background:#080C14}#c{width:100vw;height:100vh}</style></head><body><div id="c"></div><script>echarts.init(document.getElementById('c')).setOption({series:[{type:'tree',layout:'radial',data:[{name:'中心主题',children:[{name:'分支1'},{name:'分支2'},{name:'分支3'}]}],label:{color:'#C8D4E8'},itemStyle:{color:'#30D986'}}]});
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
