<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>流向地图 Flow Map</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--split:#141E30;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--split:#EEF2F7;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);padding:4px 0;margin-bottom:4px;outline:none;border-bottom:1px solid transparent;transition:color .3s}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#chart{flex:1}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:background .3s,border-color .3s}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title);transition:color .3s}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px;transition:color .3s}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border);transition:color .3s,border-color .3s}
td{padding:5px 4px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none;transition:all .2s}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
.add-row{width:100%;margin-top:10px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.add-row:hover{border-color:var(--input-focus);color:var(--input-focus)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 4px;transition:color .2s}
.del-btn:hover{color:#FF6B6B}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false">城市间人口流动图</div>
  <div class="chart-subtitle">主要城市人口迁移流向 · 线条粗细表示流量大小</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>修改后点击「应用」刷新图表</p></div>
  <div class="editor-body">
    <table><thead><tr><th>起点</th><th>终点</th><th>流量</th><th></th></tr></thead><tbody id="data-rows"></tbody></table>
    <button class="add-row" onclick="addRow()">＋ 添加行</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES = {
  dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF',series:['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF']},
  light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF',series:['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1']}
};
// Nodes with positions: x,y in [0,100] space
const CITY_COORDS = {
  '北京':[60,82],'上海':[75,60],'广州':[68,28],'深圳':[68,25],
  '成都':[35,45],'武汉':[65,52],'杭州':[76,57],'西安':[45,60],
  '重庆':[40,43],'南京':[73,58]
};
const DEFAULT_DATA = [
  {from:'北京',to:'上海',value:500},
  {from:'北京',to:'广州',value:320},
  {from:'上海',to:'深圳',value:280},
  {from:'成都',to:'北京',value:240},
  {from:'武汉',to:'上海',value:200},
  {from:'西安',to:'成都',value:180},
  {from:'重庆',to:'上海',value:160}
];
let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let mode = 'dark';
const chart = echarts.init(document.getElementById('chart'));
window.addEventListener('resize', ()=>chart.resize());

function getNodes(t) {
  const used = new Set();
  DATA.forEach(d=>{used.add(d.from);used.add(d.to);});
  return [...used].map((name,i)=>{
    const coord = CITY_COORDS[name]||[20+i*10,20+i*10];
    return {name,x:coord[0],y:coord[1],symbolSize:20,label:{show:true,color:t.textColor},itemStyle:{color:t.series[i%t.series.length]}};
  });
}

function buildOption(t) {
  const maxVal = Math.max(...DATA.map(d=>d.value));
  return {
    backgroundColor:'transparent',
    tooltip:{trigger:'item',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:p=>p.data.source?`${p.data.source} → ${p.data.target}<br/>流量: ${p.data.value}`:p.data.name},
    series:[{
      type:'graph',layout:'none',
      nodes:getNodes(t),
      edges:DATA.map(d=>({source:d.from,target:d.to,value:d.value,lineStyle:{width:Math.max(1,d.value/maxVal*8),color:'source',curveness:0.2,opacity:0.7}})),
      label:{show:true,position:'right',color:t.textColor,fontSize:12},
      edgeSymbol:['none','arrow'],
      edgeSymbolSize:[0,8]
    }]
  };
}

function renderTable(){
  const t = THEMES[mode];
  document.getElementById('data-rows').innerHTML = DATA.map((d,i)=>`<tr>
    <td><input value="${d.from}" oninput="DATA[${i}].from=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input value="${d.to}" oninput="DATA[${i}].to=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input type="number" value="${d.value}" oninput="DATA[${i}].value=+this.value" style="width:60px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><button class="del-btn" onclick="removeRow(${i})">×</button></td>
  </tr>`).join('');
}
function removeRow(i){DATA.splice(i,1);renderTable();}
function addRow(){DATA.push({from:'新起点',to:'新终点',value:100});renderTable();}
function applyData(){chart.setOption(buildOption(THEMES[mode]),true);showToast('✓ 已更新');}
function resetData(){DATA=JSON.parse(JSON.stringify(DEFAULT_DATA));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){
  const t=THEMES[m];
  document.documentElement.className=m==='light'?'theme-light':'';
  document.querySelector('.editor').style.background=t.panelBg;
  document.querySelector('.editor').style.borderColor=t.border;
  const btn=document.getElementById('theme-btn');
  if(btn){btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;}
  renderTable();chart.setOption(buildOption(t),true);
}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);const btn=document.getElementById('theme-btn');if(btn)btn.textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
window.addEventListener('message',function(e){if(e.data&&e.data.type==='setTheme'){mode=e.data.theme;applyTheme(mode);var btn=document.getElementById('theme-btn');if(btn)btn.style.display='none';}});
renderTable();applyTheme('dark');
</script>
</body>
</html>
