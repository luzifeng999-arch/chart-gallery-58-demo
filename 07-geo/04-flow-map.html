<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>流向地图</title><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><style>body{margin:0;background:#080C14}#c{width:100vw;height:100vh}</style></head><body><div id="c"></div><script>echarts.init(document.getElementById('c')).setOption({series:[{type:'lines',data:[[{coord:[116,40]},{coord:[121,31]}]],lineStyle:{color:'#4D9EFF',width:2}}]});
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
