<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>气泡地图 Bubble Map</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:16px;font-size:12px;color:var(--label);line-height:1.8}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">全国主要城市GDP气泡地图（散点模拟）</div>
  <div class="chart-subtitle">气泡大小=GDP规模 · 位置=经纬度 · 真实地图需GeoJSON</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>气泡地图说明</h3><p>Bubble Map</p></div>
  <div class="editor-body">气泡地图在地理底图上叠加不同大小的气泡，编码数值大小。此处用散点图模拟，真实实现需要地图底图（china.json等）。</div>
</div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',s:['#4D9EFF','#30D986','#FFB340'],btnSec:'#1A2236',textColor:'#C8D4E8'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',s:['#2B7FFF','#00B96B','#FA8C16'],btnSec:'#F0F4FA',textColor:'#2D3A4A'}};
let mode='dark';const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
const CITIES=[['北京',4.3,40,116],['上海',4.5,31,121],['广州',3.0,23,113],['深圳',3.2,22,114],['杭州',1.9,30,120],['成都',2.1,30,104],['重庆',2.9,29,106],['武汉',1.8,30,114],['西安',1.2,34,109],['南京',1.7,32,119]];
function buildOption(t){return{backgroundColor:'transparent',geo:{map:'none',roam:true},xAxis:{type:'value',show:false},yAxis:{type:'value',show:false},series:[{type:'scatter',coordinateSystem:'cartesian2d',data:CITIES.map(c=>[c[3],c[2],c[1],c[0]]),symbolSize:d=>Math.sqrt(d[2])*15,itemStyle:{color:t.s[0]+'cc',shadowBlur:8},label:{show:true,formatter:p=>p.data[3],color:t.textColor,fontSize:10,position:'top'}}]};}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.getElementById('theme-btn').style.background=t.btnSec;document.getElementById('theme-btn').style.color=t.textColor;chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
