<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>点密度图</title><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><style>body{margin:0;background:#080C14}#c{width:100vw;height:100vh}</style></head><body><div id="c"></div><script>const d=Array(200).fill(0).map(()=>[Math.random()*100,Math.random()*100]);echarts.init(document.getElementById('c')).setOption({xAxis:{type:'value'},yAxis:{type:'value'},series:[{type:'scatter',data:d,symbolSize:3,itemStyle:{color:'#30D986'}}]});
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
