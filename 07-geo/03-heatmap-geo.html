<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>地理热力图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{margin:0;padding:0}body{background:#080C14;font-family:'PingFang SC',sans-serif;display:flex;height:100vh}#chart{flex:1}</style></head>
<body><div id="chart"></div>
<script>const chart=echarts.init(document.getElementById('chart'));chart.setOption({backgroundColor:'transparent',visualMap:{min:0,max:100,inRange:{color:['#0E1420','#1565C0','#30D986']}},series:[{type:'heatmap',data:[[0,0,50],[1,0,80],[0,1,30],[1,1,90]]}]});
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script></body></html>
