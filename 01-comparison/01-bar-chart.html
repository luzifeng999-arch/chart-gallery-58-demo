<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>柱状图 Bar Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--axis-border:#243048;--split:#141E30;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--axis-border:#C8D4E0;--split:#EEF2F7;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);padding:4px 0;margin-bottom:4px;outline:none;border-bottom:1px solid transparent;transition:color .3s}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#chart{flex:1}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:background .3s,border-color .3s}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title);transition:color .3s}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px;transition:color .3s}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border);transition:color .3s,border-color .3s}
td{padding:5px 4px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none;transition:all .2s}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
.add-row{width:100%;margin-top:10px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.add-row:hover{border-color:var(--input-focus);color:var(--input-focus)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 4px;transition:color .2s}
.del-btn:hover{color:#FF6B6B}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false" onblur="syncTitle(this.innerText)">各城市年度销售额对比 · 同比增长分析</div>
  <div class="chart-subtitle">2024年 vs 2023年 · 单位：万元 · 核心洞察：北京全年领跑并超越目标线，Q4整体回暖</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>修改后点击「应用」刷新图表</p></div>
  <div class="editor-body">
    <table><thead><tr><th>城市</th><th>销售额</th><th></th></tr></thead><tbody id="data-rows"></tbody></table>
    <button class="add-row" onclick="addRow()">＋ 添加行</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES = {
  dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',series:['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF','#FF8C42','#00D4D4','#7EF5A0'],positive:'#30D986',negative:'#FF6B6B',btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},
  light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',series:['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1','#F97316','#0891B2','#16A34A'],positive:'#00B96B',negative:'#F5222D',btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}
};
const DEFAULT_DATA = {
  labels:['北京','上海','广州','深圳','杭州','成都'],
  values:[820,750,630,710,580,490],
  prevValues:[672,624,528,590,482,410],
  target:700
};
let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let mode = 'dark';
const chart = echarts.init(document.getElementById('chart'));
window.addEventListener('resize', ()=>chart.resize());
function buildOption(t){
  const maxVal = Math.max(...DATA.values);
  const minVal = Math.min(...DATA.values);
  const avg = Math.round(DATA.values.reduce((a,b)=>a+b,0)/DATA.values.length);
  const target = DATA.target || Math.round(avg * 1.15);
  // YoY prev year data (simulate ~80% of current)
  const prevValues = DATA.prevValues || DATA.values.map(v=>Math.round(v*0.82));
  return {
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},axisPointer:{type:'shadow'},
      formatter:params=>{
        const cur=params.find(p=>p.seriesName==='本年');
        const prev=params.find(p=>p.seriesName==='去年');
        if(!cur)return '';
        const yoy=prev?((cur.value-prev.value)/prev.value*100).toFixed(1):'';
        return `${cur.axisValue}<br/>本年：<b>${cur.value}万</b>${yoy?`<br/>同比：<b style="color:${cur.value>prev.value?t.positive:t.negative}">${cur.value>prev.value?'+':''}${yoy}%</b>`:''}${prev?`<br/>去年：${prev.value}万`:''}`;
      }
    },
    legend:{data:['本年','去年'],right:60,top:4,textStyle:{color:t.labelColor},itemWidth:16,itemHeight:10},
    grid:{left:60,right:20,top:36,bottom:40},
    xAxis:{type:'category',data:DATA.labels,axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor},axisTick:{show:false}},
    yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor,formatter:v=>v+'万'},min:v=>Math.floor(v.min*0.9/100)*100},
    series:[
      {
        name:'本年',type:'bar',barMaxWidth:36,barGap:'20%',
        data:DATA.values.map((v)=>({
          value:v,
          itemStyle:{
            color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[
              {offset:0,color:v===maxVal?t.series[0]:(v===minVal?t.series[3]:t.series[0])},
              {offset:1,color:v===maxVal?t.series[0]+'66':(v===minVal?t.series[3]+'44':t.series[0]+'44')}
            ]},
            borderRadius:[4,4,0,0],
            shadowBlur:v===maxVal?12:0,shadowColor:t.series[0]+'88'
          }
        })),
        markPoint:{
          data:[
            {type:'max',name:'峰值',label:{color:'#fff',fontSize:11}},
          ],
          symbol:'roundRect',symbolSize:[52,28],symbolOffset:[0,-20],
          itemStyle:{color:t.series[2],shadowBlur:10,shadowColor:t.series[2]+'88'}
        },
        markLine:{
          silent:true,
          data:[
            {yAxis:target,name:'目标',lineStyle:{color:t.positive,width:2,type:'dashed'},
             label:{formatter:`目标 ${target}万`,color:t.positive,position:'end',fontSize:11}},
            {type:'average',name:'均值',lineStyle:{color:t.labelColor,width:1,type:'dotted'},
             label:{formatter:params=>`均值 ${Math.round(params.value)}万`,color:t.labelColor,position:'insideEndBottom',fontSize:10}}
          ],
          symbol:['none','none']
        },
        label:{show:true,position:'top',color:t.labelColor,fontSize:11,formatter:v=>{
          const yoy=((v.value-prevValues[v.dataIndex])/prevValues[v.dataIndex]*100).toFixed(0);
          return v.value===maxVal?`{peak|${v.value}万\n+${yoy}%}`:`${v.value}万`;
        },
        rich:{peak:{color:t.series[0],fontWeight:'700',fontSize:12,lineHeight:18}}}
      },
      {
        name:'去年',type:'bar',barMaxWidth:36,
        data:prevValues.map(v=>({value:v,itemStyle:{color:t.labelColor+'55',borderRadius:[4,4,0,0]}})),
        label:{show:false}
      }
    ]
  };
}
function renderTable(){
  const tbody = document.getElementById('data-rows');
  const t = THEMES[mode];
  tbody.innerHTML = DATA.labels.map((l,i)=>`<tr>
    <td><input value="${l}" oninput="DATA.labels[${i}]=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input type="number" value="${DATA.values[i]}" oninput="DATA.values[${i}]=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><button class="del-btn" onclick="removeRow(${i})">×</button></td>
  </tr>`).join('');
}
function addRow(){DATA.labels.push('新城市');DATA.values.push(300);renderTable();}
function removeRow(i){DATA.labels.splice(i,1);DATA.values.splice(i,1);renderTable();applyData();}
function applyData(){chart.setOption(buildOption(THEMES[mode]),true);showToast('✓ 已更新');}
function resetData(){DATA=JSON.parse(JSON.stringify(DEFAULT_DATA));renderTable();applyData();showToast('↺ 已重置');}
function syncTitle(t){chart.setOption({title:{text:t}});}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){
  const t=THEMES[m];
  document.documentElement.className=m==='light'?'theme-light':'';
  document.querySelector('.editor').style.background=t.panelBg;
  document.querySelector('.editor').style.borderColor=t.border;
  const btn=document.getElementById('theme-btn');
  btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;
  renderTable();
  chart.setOption(buildOption(t),true);
}
function toggleTheme(){
  mode=mode==='dark'?'light':'dark';
  applyTheme(mode);
  document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';
}
renderTable();applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script>
</body>
</html>
