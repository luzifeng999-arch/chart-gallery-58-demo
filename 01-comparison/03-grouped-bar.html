<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>分组柱状图 Grouped Bar Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--split:#141E30;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--split:#EEF2F7;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#chart{flex:1}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
.series-label{font-size:12px;color:var(--label);margin:8px 0 4px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:5px 4px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}
.btn-apply{background:#238636;color:#fff;border-color:#238636}
.btn-reset{background:var(--btn-sec);color:var(--text)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">四大平台用户增长对比（2021–2024）</div>
  <div class="chart-subtitle">年度活跃用户数（百万）· 核心洞察：抖音增速持续领跑，快手Q4强势反弹</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>多系列分组对比</p></div>
  <div class="editor-body" id="editor-body"></div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',series:['#4D9EFF','#30D986','#FFB340','#FF6B6B'],btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',series:['#2B7FFF','#00B96B','#FA8C16','#F5222D'],btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
const DEFAULT={categories:['2021','2022','2023','2024'],series:[{name:'抖音',values:[680,750,820,910]},{name:'快手',values:[470,520,560,630]},{name:'微信视频号',values:[200,350,480,560]},{name:'B站',values:[220,260,310,340]}]};
let DATA=JSON.parse(JSON.stringify(DEFAULT)),mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildOption(t){
  return{backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},axisPointer:{type:'shadow'}},legend:{textStyle:{color:t.textColor},top:0,right:20},grid:{left:50,right:20,top:36,bottom:40},xAxis:{type:'category',data:DATA.categories,axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor},axisTick:{show:false}},yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor,formatter:v=>v+'M'}},series:DATA.series.map((s,i)=>({name:s.name,type:'bar',barGap:'10%',data:s.values.map(v=>({value:v,itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:t.series[i%4]},{offset:1,color:t.series[i%4]+'55'}]},borderRadius:[3,3,0,0]}})),label:{show:true,position:'top',color:t.labelColor,fontSize:11,formatter:v=>v.value}}))};
}
function renderTable(){
  const t=THEMES[mode];
  document.getElementById('editor-body').innerHTML=DATA.series.map((s,si)=>`
    <div class="series-label" style="color:${t.series[si%4]}">${s.name}</div>
    <table><thead><tr><th>年份</th><th>数值</th></tr></thead><tbody>
    ${DATA.categories.map((c,ci)=>`<tr>
      <td><input value="${c}" oninput="DATA.categories[${ci}]=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
      <td><input type="number" value="${s.values[ci]}" oninput="DATA.series[${si}].values[${ci}]=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    </tr>`).join('')}
    </tbody></table>`).join('');
}
function applyData(){chart.setOption(buildOption(THEMES[mode]),true);showToast('✓ 已更新');}
function resetData(){DATA=JSON.parse(JSON.stringify(DEFAULT));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=THEMES[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
renderTable();applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script>
</body>
</html>
