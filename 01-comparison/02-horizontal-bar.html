<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>条形图 Horizontal Bar Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--axis-border:#243048;--split:#141E30;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--axis-border:#C8D4E0;--split:#EEF2F7;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#chart{flex:1}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:background .3s}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:5px 4px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none;transition:all .2s}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}
.btn-apply{background:#238636;color:#fff;border-color:#238636}
.btn-reset{background:var(--btn-sec);color:var(--text)}
.add-row{width:100%;margin-top:10px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 4px}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">各编程语言开发者使用率排名</div>
  <div class="chart-subtitle">TOP语言达62.3%使用率 · YoY +15.8% · 已超目标线(55%) · 标签较长时首选横向条形图</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>修改后点击「应用」刷新</p></div>
  <div class="editor-body">
    <table><thead><tr><th>语言</th><th>占比%</th><th></th></tr></thead><tbody id="data-rows"></tbody></table>
    <button class="add-row" onclick="addRow()">＋ 添加行</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',series:['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF','#FF8C42','#00D4D4','#7EF5A0'],btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',series:['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1','#F97316','#0891B2','#16A34A'],btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
const DEFAULT={labels:['JavaScript','Python','TypeScript','Java','C#','C++','PHP','Go','Rust','Kotlin'],values:[62.3,51.0,38.5,30.7,27.1,23.0,18.6,14.7,13.5,9.4]};
let DATA=JSON.parse(JSON.stringify(DEFAULT)),mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function buildOption(t){
  const sorted=[...DATA.labels.map((l,i)=>({l,v:DATA.values[i],prev:DATA.values[i]*0.88}))].sort((a,b)=>a.v-b.v);
  const max=Math.max(...sorted.map(d=>d.v));
  const target=55; // 目标线
  return{backgroundColor:'transparent',tooltip:{trigger:'axis',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},axisPointer:{type:'shadow'},formatter:params=>{const p=params[0];const item=sorted.find(d=>d.l===p.name);const yoy=item?((item.v-item.prev)/item.prev*100).toFixed(1):0;return`<b>${p.name}</b><br/>当前: ${p.value}%<br/>去年: ${item?item.prev.toFixed(1):0}%<br/>YoY: <span style="color:${yoy>0?'#30D986':'#FF6B6B'}">${yoy>0?'+':''}${yoy}%</span>`}},grid:{left:110,right:90,top:30,bottom:40},xAxis:{type:'value',max:70,axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor,formatter:v=>v+'%'}},yAxis:{type:'category',data:sorted.map(d=>d.l),axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.textColor,fontSize:12},axisTick:{show:false}},series:[{type:'bar',barMaxWidth:28,data:sorted.map((d,i)=>({value:d.v,itemStyle:{color:d.v===max?{type:'linear',x:0,y:0,x2:1,y2:0,colorStops:[{offset:0,color:t.series[3]+'CC'},{offset:1,color:t.series[3]}]}:{type:'linear',x:0,y:0,x2:1,y2:0,colorStops:[{offset:0,color:t.series[0]+'88'},{offset:1,color:t.series[0]}]},borderRadius:[0,4,4,0],shadowBlur:d.v===max?15:0,shadowColor:d.v===max?(t.series[3]+'66'):'transparent'}})),label:{show:true,position:'right',color:t.labelColor,formatter:params=>{const yoy=((sorted[params.dataIndex].v-sorted[params.dataIndex].prev)/sorted[params.dataIndex].prev*100).toFixed(1);return`{val|${params.value}%} {yoy|${yoy>0?'+':''}${yoy}%}`;},rich:{val:{fontSize:12,fontWeight:600},yoy:{fontSize:10,color:t.labelColor+'AA',padding:[0,0,0,4]}}},markLine:{silent:true,symbol:'none',data:[{xAxis:target,lineStyle:{color:t.series[1]+'CC',width:2,type:'dashed'},label:{formatter:`目标 ${target}%`,position:'end',color:t.series[1],fontSize:11,padding:[2,6],backgroundColor:t.panelBg,borderRadius:4}}]},markPoint:{data:[{coord:[sorted[sorted.length-1].v,sorted[sorted.length-1].l],value:'TOP\n'+sorted[sorted.length-1].v+'%',symbol:'circle',symbolSize:50,itemStyle:{color:t.series[3]+'22',borderColor:t.series[3],borderWidth:2},label:{show:true,formatter:'{c}',color:t.series[3],fontSize:10,fontWeight:600}}]}}]};
}
function renderTable(){
  const t=THEMES[mode];
  document.getElementById('data-rows').innerHTML=DATA.labels.map((l,i)=>`<tr><td><input value="${l}" oninput="DATA.labels[${i}]=this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><input type="number" step="0.1" value="${DATA.values[i]}" oninput="DATA.values[${i}]=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><button class="del-btn" onclick="removeRow(${i})">×</button></td></tr>`).join('');
}
function addRow(){DATA.labels.push('新项目');DATA.values.push(5);renderTable();}
function removeRow(i){DATA.labels.splice(i,1);DATA.values.splice(i,1);renderTable();applyData();}
function applyData(){chart.setOption(buildOption(THEMES[mode]),true);showToast('✓ 已更新');}
function resetData(){DATA=JSON.parse(JSON.stringify(DEFAULT));renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=THEMES[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
renderTable();applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script>
</body>
</html>
