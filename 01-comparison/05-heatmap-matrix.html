<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>热力矩阵 Heatmap Matrix</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#chart{flex:1}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px;font-size:12px;color:var(--label)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}
.btn-apply{background:#238636;color:#fff;border-color:#238636}
.btn-reset{background:var(--btn-sec);color:var(--text)}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
textarea{width:100%;height:240px;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:8px;border-radius:6px;font-size:11px;font-family:monospace;resize:vertical;outline:none;margin-top:8px;line-height:1.5}
textarea:focus{border-color:var(--input-focus)}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">各部门每周工作效率热力矩阵</div>
  <div class="chart-subtitle">颜色越深代表效率越高 · 核心洞察：研发团队周三峰值突出，运营周末明显下滑</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>格式：行,列,值（每行一条）</p></div>
  <div class="editor-body">
    <span>编辑矩阵数据（行=部门，列=星期）：</span>
    <textarea id="data-input" oninput="parseInput()"></textarea>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',heatmap:['#080C14','#0D2045','#1040A0','#4D9EFF','#B8E0FF'],btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',heatmap:['#F5F7FA','#D6E8FF','#8EC5FC','#2B7FFF','#1A4FBF'],btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
const days=['周一','周二','周三','周四','周五','周六','周日'];
const depts=['研发','产品','设计','运营','市场','销售'];
const DEFAULT_MATRIX=[[82,78,95,88,76,42,35],[75,80,72,85,78,50,40],[70,75,88,80,72,55,45],[85,82,78,76,80,60,50],[72,70,68,75,82,65,55],[90,85,80,78,85,45,35]];
let DATA=JSON.parse(JSON.stringify(DEFAULT_MATRIX)),mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
function flatData(){
  const arr=[];
  DATA.forEach((row,ri)=>row.forEach((v,ci)=>arr.push([ci,ri,v])));
  return arr;
}
function buildOption(t){
  const flat=flatData();
  const vals=flat.map(d=>d[2]);
  return{backgroundColor:'transparent',tooltip:{trigger:'item',formatter:p=>`${depts[p.data[1]]} ${days[p.data[0]]}<br/>效率：<b>${p.data[2]}</b>`,backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor}},grid:{left:60,right:100,top:20,bottom:40},xAxis:{type:'category',data:days,axisLine:{lineStyle:{color:t.border}},axisLabel:{color:t.labelColor},axisTick:{show:false}},yAxis:{type:'category',data:depts,axisLine:{lineStyle:{color:t.border}},axisLabel:{color:t.textColor},axisTick:{show:false}},visualMap:{min:Math.min(...vals),max:Math.max(...vals),calculable:true,orient:'vertical',right:10,top:'center',textStyle:{color:t.textColor},inRange:{color:t.heatmap}},series:[{type:'heatmap',data:flat,label:{show:true,color:t.textColor,fontSize:11},emphasis:{itemStyle:{shadowBlur:10,shadowColor:t.heatmap[3]}}}]};
}
function resetData(){DATA=JSON.parse(JSON.stringify(DEFAULT_MATRIX));updateTextarea();applyData();showToast('↺ 已重置');}
function updateTextarea(){document.getElementById('data-input').value=DATA.map((row,ri)=>row.map((v,ci)=>`${depts[ri]},${days[ci]},${v}`).join('\n')).join('\n');}
function parseInput(){}
function applyData(){chart.setOption(buildOption(THEMES[mode]),true);showToast('✓ 已更新');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){
  const t=THEMES[m];document.documentElement.className=m==='light'?'theme-light':'';
  document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;
  const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;
  const ta=document.getElementById('data-input');ta.style.background=t.inputBg;ta.style.borderColor=t.inputBorder;ta.style.color=t.textColor;
  chart.setOption(buildOption(t),true);
}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
updateTextarea();applyTheme('dark');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setTheme') {
    if (typeof applyTheme === 'function') {
      mode = e.data.theme;
      applyTheme(mode);
    }
    var btn = document.getElementById('theme-btn');
    if (btn) btn.style.display = 'none';
  }
});</script>
</body>
</html>
