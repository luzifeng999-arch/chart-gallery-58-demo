<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>直方图 Histogram</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:16px;font-size:12px;color:var(--label);line-height:1.8}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)}.stat-label{color:var(--label)}.stat-value{color:var(--text);font-weight:600}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">工程师薪资分布直方图</div>
  <div class="chart-subtitle">正态分布形状 · 核心洞察：集中在25-40K区间，高薪长尾向右延伸</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>分布统计</h3><p>频率分布参数</p></div>
  <div class="editor-body" id="stats-panel">
    <div class="stat-row"><span class="stat-label">分布形状</span><span class="stat-value" style="color:#4D9EFF">近似正态</span></div>
    <div class="stat-row"><span class="stat-label">均值</span><span class="stat-value" id="s-mean">-</span></div>
    <div class="stat-row"><span class="stat-label">中位数</span><span class="stat-value" id="s-median">-</span></div>
    <div class="stat-row"><span class="stat-label">众数区间</span><span class="stat-value" id="s-mode">-</span></div>
    <div class="stat-row"><span class="stat-label">数据范围</span><span class="stat-value" id="s-range">-</span></div>
    <br>
    <b>适用场景：</b><br>
    查看连续数值数据的频率分布形状——是否正态？是否偏态？是否存在双峰？
  </div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',s:['#4D9EFF'],btnSec:'#1A2236',positive:'#30D986'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',s:['#2B7FFF'],btnSec:'#F0F4FA',positive:'#00B96B'}};
const bins=['10-15K','15-20K','20-25K','25-30K','30-35K','35-40K','40-45K','45-50K','50-60K','60-80K','80K+'];
const DF_FREQ=[8,22,55,98,142,138,106,72,45,18,6];
let FREQ=[...DF_FREQ],mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
const midpoints=[12.5,17.5,22.5,27.5,32.5,37.5,42.5,47.5,55,70,90];
function calcStats(){
  const total=FREQ.reduce((s,v)=>s+v,0);
  const weightedSum=FREQ.reduce((s,v,i)=>s+v*midpoints[i],0);
  const mean=(weightedSum/total).toFixed(1);
  let cum=0,medianBin=0;
  for(let i=0;i<FREQ.length;i++){cum+=FREQ[i];if(cum>=total/2){medianBin=i;break;}}
  const maxI=FREQ.indexOf(Math.max(...FREQ));
  document.getElementById('s-mean').textContent=mean+'K';
  document.getElementById('s-median').textContent=bins[medianBin];
  document.getElementById('s-mode').textContent=bins[maxI];
  document.getElementById('s-range').textContent=`${bins[0]} ~ ${bins[bins.length-1]}`;
}
function buildOption(t){
  const maxF=Math.max(...FREQ);
  return{backgroundColor:'transparent',tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:p=>`${bins[p[0].dataIndex]}<br/>频次：<b>${p[0].value}</b>人`},grid:{left:60,right:20,top:20,bottom:40},xAxis:{type:'category',data:bins,axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor,fontSize:10,rotate:20},axisTick:{show:false}},yAxis:{type:'value',axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor}},series:[{type:'bar',data:FREQ.map((v,i)=>({value:v,itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:v===maxF?t.positive:t.s[0]},{offset:1,color:v===maxF?t.positive+'55':t.s[0]+'44'}]},borderRadius:[3,3,0,0]}})),barCategoryGap:'5%',label:{show:true,position:'top',color:t.labelColor,fontSize:10,formatter:v=>v.value},markLine:{data:[{type:'average',name:'均值'}],lineStyle:{color:t.positive,type:'dashed'},label:{color:t.positive}}}]};}
function applyData(){calcStats();chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){FREQ=[...DF_FREQ];calcStats();chart.setOption(buildOption(T[mode]),true);showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;calcStats();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
applyTheme('dark');
</script></body></html>
