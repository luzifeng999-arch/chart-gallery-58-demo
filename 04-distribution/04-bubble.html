<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><title>气泡图 Bubble Chart</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:'PingFang SC',sans-serif;display:flex;height:100vh;transition:background .3s}:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-sec:#1A2236}.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-sec:#F0F4FA}.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}.chart-title{font-size:18px;font-weight:700;color:var(--title);margin-bottom:4px}.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}#chart{flex:1}.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column}.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}.editor-header p{font-size:12px;color:var(--label);margin-top:4px}.editor-body{flex:1;overflow-y:auto;padding:12px 16px}.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}table{width:100%;border-collapse:collapse;font-size:12px}th{color:var(--label);font-weight:500;padding:6px 3px;text-align:left;border-bottom:1px solid var(--border)}td{padding:4px 3px}td input{width:100%;background:var(--input-bg,#080C14);border:1px solid var(--input-border,#1A2236);color:var(--text);padding:3px 4px;border-radius:4px;font-size:10px;outline:none}.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border)}.btn-apply{background:#238636;color:#fff;border-color:#238636}.btn-reset{background:var(--btn-sec);color:var(--text)}#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}</style></head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title">全球主要国家：GDP / 人均收入 / 人口规模</div>
  <div class="chart-subtitle">X=GDP(万亿$) · Y=人均GDP(万$) · 气泡大小=人口规模 · 颜色区分地区</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>国家/X/Y/泡大小</p></div>
  <div class="editor-body"><table><thead><tr><th>国家</th><th>GDP</th><th>人均</th><th>人口</th></tr></thead><tbody id="data-rows"></tbody></table></div>
  <div class="editor-footer"><button class="btn btn-reset" onclick="resetData()">↺ 重置</button><button class="btn btn-apply" onclick="applyData()">✓ 应用</button></div>
</div>
<div id="toast"></div>
<script>
const T={dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',axisBorder:'#243048',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',s:['#4D9EFF','#30D986','#FFB340','#9B7FFF','#FF8C42'],btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF'},light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',axisBorder:'#C8D4E0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',s:['#2B7FFF','#00B96B','#FA8C16','#722ED1','#F97316'],btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF'}};
// [name, gdp(T$), per_capita($万), population(亿), region_idx]
const DF=[['美国',25.5,6.8,3.3,0],['中国',18.0,1.28,14.0,1],['日本',4.3,3.4,1.25,2],['德国',4.1,4.9,0.84,0],['印度',3.4,0.24,14.2,3],['英国',3.1,4.6,0.68,0],['法国',2.8,4.3,0.68,0],['巴西',2.1,1.0,2.15,4],['加拿大',2.1,5.5,0.38,0],['韩国',1.7,3.2,0.51,2]];
let D=[...DF],mode='dark';
const chart=echarts.init(document.getElementById('chart'));
window.addEventListener('resize',()=>chart.resize());
const REGIONS=['欧美','东亚','日韩','南亚','南美'];
function buildOption(t){
  const byRegion={};D.forEach(d=>{const r=REGIONS[d[4]];if(!byRegion[r])byRegion[r]=[];byRegion[r].push(d);});
  return{backgroundColor:'transparent',legend:{data:REGIONS,textStyle:{color:t.textColor},top:0},tooltip:{trigger:'item',backgroundColor:t.panelBg,borderColor:t.border,textStyle:{color:t.textColor},formatter:p=>`<b>${p.data[5]}</b><br/>GDP：${p.data[0]}万亿$<br/>人均：${p.data[1]}万$<br/>人口：${p.data[2]}亿`},grid:{left:60,right:30,top:36,bottom:50},xAxis:{type:'value',name:'GDP(万亿$)',nameTextStyle:{color:t.labelColor},axisLine:{lineStyle:{color:t.axisBorder}},axisLabel:{color:t.labelColor},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}}},yAxis:{type:'value',name:'人均GDP(万$)',nameTextStyle:{color:t.labelColor},axisLine:{show:false},axisTick:{show:false},splitLine:{lineStyle:{color:t.split,type:'dashed'}},axisLabel:{color:t.labelColor}},series:Object.entries(byRegion).map(([name,pts],i)=>({name,type:'scatter',data:pts.map(d=>[d[1],d[2],d[3],d[0],d[5]||d[0]]),symbolSize:d=>Math.max(12,Math.sqrt(d[2])*18),itemStyle:{color:t.s[REGIONS.indexOf(name)%5]+'cc',borderColor:t.s[REGIONS.indexOf(name)%5],borderWidth:1},label:{show:true,position:'top',formatter:p=>p.data[3],color:t.textColor,fontSize:10}}))};}
D.forEach(d=>d.push(d[0]));
function renderTable(){const t=T[mode];document.getElementById('data-rows').innerHTML=D.map((d,i)=>`<tr><td style="color:${t.s[d[4]%5]};font-size:11px;font-weight:600">${d[0]}</td><td><input type="number" step="0.1" value="${d[1]}" oninput="D[${i}][1]=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><input type="number" step="0.1" value="${d[2]}" oninput="D[${i}][2]=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td><td><input type="number" step="0.1" value="${d[3]}" oninput="D[${i}][3]=+this.value" style="background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td></tr>`).join('');}
function applyData(){chart.setOption(buildOption(T[mode]),true);showToast('✓ 已更新');}
function resetData(){D=[...DF].map(d=>[...d]);renderTable();applyData();showToast('↺ 已重置');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1800);}
function applyTheme(m){const t=T[m];document.documentElement.className=m==='light'?'theme-light':'';document.querySelector('.editor').style.background=t.panelBg;document.querySelector('.editor').style.borderColor=t.border;const btn=document.getElementById('theme-btn');btn.style.background=t.btnSec;btn.style.color=t.textColor;btn.style.borderColor=t.border;renderTable();chart.setOption(buildOption(t),true);}
function toggleTheme(){mode=mode==='dark'?'light':'dark';applyTheme(mode);document.getElementById('theme-btn').textContent=mode==='dark'?'☀️ 亮色':'🌑 暗色';}
renderTable();applyTheme('dark');
</script></body></html>
