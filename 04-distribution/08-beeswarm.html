<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>蜂群图 Beeswarm</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;display:flex;height:100vh;transition:background .3s,color .3s}
:root{--bg:#080C14;--panel-bg:#0E1420;--border:#1A2236;--split:#141E30;--title:#F0F4FF;--text:#C8D4E8;--label:#5A6A84;--btn-pri:#238636;--btn-sec:#1A2236;--input-bg:#080C14;--input-border:#1A2236;--input-focus:#4D9EFF}
.theme-light{--bg:#F5F7FA;--panel-bg:#FFFFFF;--border:#E1E8F0;--split:#EEF2F7;--title:#0D1525;--text:#2D3A4A;--label:#8A9BB0;--btn-pri:#1677FF;--btn-sec:#F0F4FA;--input-bg:#FFFFFF;--input-border:#D9E3EE;--input-focus:#2B7FFF}
.chart-area{flex:1;display:flex;flex-direction:column;padding:24px;min-width:0}
.chart-title{font-size:18px;font-weight:700;color:var(--title);padding:4px 0;margin-bottom:4px;outline:none;transition:color .3s}
.chart-subtitle{font-size:13px;color:var(--label);margin-bottom:16px}
#chart{flex:1}
.editor{width:280px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:background .3s,border-color .3s}
.editor-header{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.editor-header h3{font-size:14px;font-weight:600;color:var(--title)}
.editor-header p{font-size:12px;color:var(--label);margin-top:4px}
.editor-body{flex:1;overflow-y:auto;padding:12px 16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--label);font-weight:500;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:4px 2px}
td input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;outline:none;transition:all .2s}
td input:focus{border-color:var(--input-focus)}
.editor-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn{flex:1;padding:7px 0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.btn-apply{background:var(--btn-pri);color:#fff;border-color:var(--btn-pri)}
.btn-reset{background:var(--btn-sec);color:var(--text)}
.add-row{width:100%;margin-top:8px;padding:6px;background:transparent;border:1px dashed var(--border);color:var(--label);border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.add-row:hover{border-color:var(--input-focus);color:var(--input-focus)}
.del-btn{background:none;border:none;color:var(--label);cursor:pointer;font-size:14px;padding:0 2px}
.del-btn:hover{color:#FF6B6B}
#theme-btn{position:fixed;top:14px;right:14px;z-index:999;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--btn-sec);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .4s;pointer-events:none}
.insight-box{background:rgba(77,158,255,0.08);border:1px solid rgba(77,158,255,0.2);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.insight-box p{font-size:12px;color:var(--text);line-height:1.6}
.insight-title{font-size:11px;color:#4D9EFF;font-weight:600;margin-bottom:4px}
</style>
</head>
<body>
<button id="theme-btn" onclick="toggleTheme()">☀️ 亮色</button>
<div class="chart-area">
  <div class="chart-title" contenteditable="true" spellcheck="false">员工薪资分布蜂群图</div>
  <div class="chart-subtitle">各部门全体员工年薪分布 · 每个点代表一位员工 · 避免点重叠完整呈现密度</div>
  <div id="chart"></div>
</div>
<div class="editor">
  <div class="editor-header"><h3>数据编辑</h3><p>每行一个数据点（姓名/ID、数值、分组）</p></div>
  <div class="editor-body">
    <div class="insight-box">
      <div class="insight-title">💡 核心洞察</div>
      <p>技术部薪资集中在40-70万区间；产品部中位数最高；市场部分布最分散，离群值最多。</p>
    </div>
    <table>
      <thead><tr><th>姓名/ID</th><th>数值</th><th>分组</th><th></th></tr></thead>
      <tbody id="data-rows"></tbody>
    </table>
    <button class="add-row" onclick="addRow()">＋ 添加数据点</button>
  </div>
  <div class="editor-footer">
    <button class="btn btn-reset" onclick="resetData()">↺ 重置</button>
    <button class="btn btn-apply" onclick="applyData()">✓ 应用</button>
  </div>
</div>
<div id="toast"></div>
<script>
const THEMES = {
  dark:{bg:'#080C14',panelBg:'#0E1420',border:'#1A2236',split:'#141E30',titleColor:'#F0F4FF',textColor:'#C8D4E8',labelColor:'#5A6A84',btnSec:'#1A2236',inputBg:'#080C14',inputBorder:'#1A2236',inputFocus:'#4D9EFF',colors:['#4D9EFF','#30D986','#FFB340','#FF6B6B','#9B7FFF']},
  light:{bg:'#F5F7FA',panelBg:'#FFFFFF',border:'#E1E8F0',split:'#EEF2F7',titleColor:'#0D1525',textColor:'#2D3A4A',labelColor:'#8A9BB0',btnSec:'#F0F4FA',inputBg:'#FFFFFF',inputBorder:'#D9E3EE',inputFocus:'#2B7FFF',colors:['#2B7FFF','#00B96B','#FA8C16','#F5222D','#722ED1']}
};

// name, value, group
const DEFAULT_DATA = [
  ['E01',38,'技术'],['E02',42,'技术'],['E03',45,'技术'],['E04',48,'技术'],['E05',51,'技术'],
  ['E06',53,'技术'],['E07',55,'技术'],['E08',58,'技术'],['E09',62,'技术'],['E10',68,'技术'],
  ['E11',72,'技术'],['E12',42,'产品'],['E13',48,'产品'],['E14',55,'产品'],['E15',62,'产品'],
  ['E16',70,'产品'],['E17',78,'产品'],['E18',85,'产品'],['E19',35,'市场'],['E20',38,'市场'],
  ['E21',42,'市场'],['E22',48,'市场'],['E23',55,'市场'],['E24',68,'市场'],['E25',92,'市场'],
  ['E26',40,'运营'],['E27',43,'运营'],['E28',46,'运营'],['E29',50,'运营'],['E30',54,'运营']
];

let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let mode = 'dark';
const chart = echarts.init(document.getElementById('chart'));
window.addEventListener('resize', () => chart.resize());

// Beeswarm jitter algorithm: avoid overlap along y-axis
function beeswarm(data, yPos, radius = 5, maxIter = 50) {
  const pts = data.map(v => ({ x: v, y: yPos, orig: v }));
  for (let iter = 0; iter < maxIter; iter++) {
    let moved = false;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < radius * 2 + 1) {
          const angle = Math.atan2(dy, dx);
          const push = (radius * 2 + 1 - dist) / 2;
          pts[i].y += Math.sin(angle) * push;
          pts[j].y -= Math.sin(angle) * push;
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
  return pts;
}

function buildOption(t) {
  const groups = [...new Set(DATA.map(d => d[2]))];
  const groupY = {};
  groups.forEach((g, i) => { groupY[g] = (i + 1) * 100; });

  const seriesList = groups.map((g, gi) => {
    const vals = DATA.filter(d => d[2] === g).map(d => d[1]);
    const pts = beeswarm(vals, groupY[g], 6, 80);
    const color = t.colors[gi % t.colors.length];
    return {
      name: g,
      type: 'scatter',
      data: pts.map((p, i) => {
        const origItem = DATA.filter(d => d[2] === g)[i];
        return {
          value: [p.orig, p.y],
          name: origItem ? origItem[0] : '',
          itemStyle: { color: color + 'cc', borderColor: color, borderWidth: 1 }
        };
      }),
      symbolSize: 10,
      emphasis: { scale: 1.4 }
    };
  });

  // Median markLines
  const medianSeries = groups.map((g, gi) => {
    const vals = DATA.filter(d => d[2] === g).map(d => d[1]).sort((a, b) => a - b);
    const median = vals.length % 2 === 0
      ? (vals[vals.length / 2 - 1] + vals[vals.length / 2]) / 2
      : vals[Math.floor(vals.length / 2)];
    return {
      name: g + '_median',
      type: 'scatter',
      data: [],
      markLine: {
        silent: true,
        data: [{ xAxis: median, lineStyle: { color: t.colors[gi % t.colors.length], width: 2, type: 'solid', opacity: 0.6 }, label: { formatter: `中位数: ${median}`, color: t.labelColor, fontSize: 11 } }]
      }
    };
  });

  return {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      backgroundColor: t.panelBg,
      borderColor: t.border,
      textStyle: { color: t.textColor },
      formatter: p => p.data.name ? `${p.seriesName}<br/>${p.data.name}: <b>${p.data.value[0]}万</b>` : ''
    },
    legend: { top: 8, right: 20, textStyle: { color: t.labelColor }, itemWidth: 12, itemHeight: 12 },
    grid: { left: 80, right: 30, top: 50, bottom: 60 },
    xAxis: {
      type: 'value', name: '年薪（万元）',
      nameTextStyle: { color: t.labelColor },
      axisLine: { lineStyle: { color: t.border } },
      axisLabel: { color: t.labelColor, formatter: v => v + '万' },
      splitLine: { lineStyle: { color: t.split, type: 'dashed' } },
      min: 30, max: 100
    },
    yAxis: {
      type: 'value',
      min: 0, max: groups.length * 100 + 50,
      axisLabel: {
        color: t.labelColor,
        formatter: v => {
          const g = groups.find((_, i) => Math.abs((i + 1) * 100 - v) < 20);
          return g || '';
        },
        interval: 0
      },
      axisLine: { show: false },
      splitLine: {
        show: true,
        lineStyle: { color: t.split, type: 'dashed' }
      },
      axisTick: { show: false }
    },
    series: [...seriesList, ...medianSeries]
  };
}

function renderTable() {
  const t = THEMES[mode];
  document.getElementById('data-rows').innerHTML = DATA.map((d, i) => `<tr>
    <td><input value="${d[0]}" oninput="DATA[${i}][0]=this.value" style="width:60px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input type="number" value="${d[1]}" oninput="DATA[${i}][1]=+this.value" style="width:50px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><input value="${d[2]}" oninput="DATA[${i}][2]=this.value" style="width:56px;background:${t.inputBg};border-color:${t.inputBorder};color:${t.textColor}"></td>
    <td><button class="del-btn" onclick="removeRow(${i})">×</button></td>
  </tr>`).join('');
}
function removeRow(i) { DATA.splice(i, 1); renderTable(); }
function addRow() { DATA.push(['新员工', 50, '技术']); renderTable(); }
function applyData() { chart.setOption(buildOption(THEMES[mode]), true); showToast('✓ 已更新'); }
function resetData() { DATA = JSON.parse(JSON.stringify(DEFAULT_DATA)); renderTable(); applyData(); showToast('↺ 已重置'); }
function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 1800); }
function applyTheme(m) {
  const t = THEMES[m];
  document.documentElement.className = m === 'light' ? 'theme-light' : '';
  document.querySelector('.editor').style.background = t.panelBg;
  document.querySelector('.editor').style.borderColor = t.border;
  const btn = document.getElementById('theme-btn');
  if (btn) { btn.style.background = t.btnSec; btn.style.color = t.textColor; btn.style.borderColor = t.border; }
  renderTable(); chart.setOption(buildOption(t), true);
}
function toggleTheme() { mode = mode === 'dark' ? 'light' : 'dark'; applyTheme(mode); const btn = document.getElementById('theme-btn'); if (btn) btn.textContent = mode === 'dark' ? '☀️ 亮色' : '🌑 暗色'; }
window.addEventListener('message', function(e) { if (e.data && e.data.type === 'setTheme') { mode = e.data.theme; applyTheme(mode); var btn = document.getElementById('theme-btn'); if (btn) btn.style.display = 'none'; } });
renderTable();
chart.setOption(buildOption(THEMES[mode]));
</script>
</body>
</html>
